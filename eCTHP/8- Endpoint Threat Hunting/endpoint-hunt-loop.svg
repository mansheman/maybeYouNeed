<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <rect width="1400" height="820" fill="#f5f7fb"/>
  <rect x="70" y="50" width="1260" height="720" rx="30" fill="#ffffff" stroke="#d7dfef" stroke-width="3"/>
  <text x="120" y="115" fill="#14213d" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Endpoint hunt loop</text>
  <text x="120" y="155" fill="#4f5d75" font-size="20" font-family="Arial, Helvetica, sans-serif">Use a trigger or hypothesis, then keep pivoting until the story holds or collapses.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#365486"/>
    </marker>
  </defs>

  <rect x="120" y="230" width="220" height="120" rx="20" fill="#dce8ff" stroke="#7aa2e3" stroke-width="3"/>
  <text x="160" y="280" fill="#102542" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">1. Trigger</text>
  <text x="160" y="315" fill="#243b53" font-size="18" font-family="Arial, Helvetica, sans-serif">IOC, CTI lead,</text>
  <text x="160" y="340" fill="#243b53" font-size="18" font-family="Arial, Helvetica, sans-serif">IR finding, or alert</text>

  <rect x="420" y="230" width="240" height="120" rx="20" fill="#e7f7ef" stroke="#67b984" stroke-width="3"/>
  <text x="452" y="280" fill="#123524" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">2. Hypothesis</text>
  <text x="452" y="315" fill="#274c3a" font-size="18" font-family="Arial, Helvetica, sans-serif">What should be</text>
  <text x="452" y="340" fill="#274c3a" font-size="18" font-family="Arial, Helvetica, sans-serif">visible if true?</text>

  <rect x="740" y="230" width="250" height="120" rx="20" fill="#fff4d8" stroke="#d9a441" stroke-width="3"/>
  <text x="780" y="280" fill="#4b3200" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">3. Data map</text>
  <text x="780" y="315" fill="#6c4b12" font-size="18" font-family="Arial, Helvetica, sans-serif">Security, PowerShell,</text>
  <text x="780" y="340" fill="#6c4b12" font-size="18" font-family="Arial, Helvetica, sans-serif">Sysmon, registry, tasks</text>

  <rect x="1060" y="230" width="200" height="120" rx="20" fill="#ffe1e1" stroke="#cf6a6a" stroke-width="3"/>
  <text x="1092" y="280" fill="#5a1e1e" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">4. Search</text>
  <text x="1092" y="315" fill="#6f2a2a" font-size="18" font-family="Arial, Helvetica, sans-serif">Time range, host</text>
  <text x="1092" y="340" fill="#6f2a2a" font-size="18" font-family="Arial, Helvetica, sans-serif">scope, evidence</text>

  <rect x="300" y="500" width="260" height="120" rx="20" fill="#efe4ff" stroke="#8d72c9" stroke-width="3"/>
  <text x="340" y="550" fill="#2f2057" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">5. Pivot</text>
  <text x="340" y="585" fill="#48326f" font-size="18" font-family="Arial, Helvetica, sans-serif">Parent process, child</text>
  <text x="340" y="610" fill="#48326f" font-size="18" font-family="Arial, Helvetica, sans-serif">artifacts, related hosts</text>

  <rect x="670" y="500" width="260" height="120" rx="20" fill="#dff7f5" stroke="#58a7a0" stroke-width="3"/>
  <text x="708" y="550" fill="#124645" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">6. Correlate</text>
  <text x="708" y="585" fill="#1e6461" font-size="18" font-family="Arial, Helvetica, sans-serif">Process + persistence</text>
  <text x="708" y="610" fill="#1e6461" font-size="18" font-family="Arial, Helvetica, sans-serif">+ network + identity</text>

  <rect x="1040" y="500" width="220" height="120" rx="20" fill="#f3f0ea" stroke="#97866a" stroke-width="3"/>
  <text x="1078" y="550" fill="#433729" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">7. Decide</text>
  <text x="1078" y="585" fill="#5d4d3a" font-size="18" font-family="Arial, Helvetica, sans-serif">Benign, suspicious,</text>
  <text x="1078" y="610" fill="#5d4d3a" font-size="18" font-family="Arial, Helvetica, sans-serif">or confirmed malicious</text>

  <line x1="340" y1="290" x2="420" y2="290" stroke="#365486" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="660" y1="290" x2="740" y2="290" stroke="#365486" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="990" y1="290" x2="1060" y2="290" stroke="#365486" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1150" y1="350" x2="1150" y2="500" stroke="#365486" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1040" y1="560" x2="930" y2="560" stroke="#365486" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="670" y1="560" x2="560" y2="560" stroke="#365486" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M300 560 C160 560, 130 470, 130 350 C130 300, 130 290, 120 290" fill="none" stroke="#365486" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="150" y="700" fill="#4f5d75" font-size="18" font-family="Arial, Helvetica, sans-serif">Rule: a good endpoint hunt does not stop at one indicator. It expands into related evidence until the behavior is explained.</text>
</svg>
