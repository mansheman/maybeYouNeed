<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f7f8fc"/>
  <rect x="60" y="50" width="1280" height="800" rx="28" fill="#ffffff" stroke="#d7dfef" stroke-width="3"/>
  <text x="110" y="115" fill="#14213d" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Common Windows persistence surfaces</text>
  <text x="110" y="155" fill="#52627a" font-size="20" font-family="Arial, Helvetica, sans-serif">These are the places attackers often touch when they need code to come back.</text>

  <defs>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2a4d69"/>
    </marker>
  </defs>

  <circle cx="700" cy="470" r="115" fill="#dce8ff" stroke="#7aa2e3" stroke-width="4"/>
  <text x="625" y="455" fill="#102542" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Persistence</text>
  <text x="642" y="495" fill="#29435c" font-size="20" font-family="Arial, Helvetica, sans-serif">What restarts</text>
  <text x="648" y="522" fill="#29435c" font-size="20" font-family="Arial, Helvetica, sans-serif">the payload?</text>

  <rect x="130" y="220" width="260" height="150" rx="22" fill="#fff4d8" stroke="#d9a441" stroke-width="3"/>
  <text x="180" y="270" fill="#4b3200" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Run keys</text>
  <text x="160" y="312" fill="#6c4b12" font-size="18" font-family="Arial, Helvetica, sans-serif">`HKLM\\...\\CurrentVersion\\Run`</text>
  <text x="160" y="340" fill="#6c4b12" font-size="18" font-family="Arial, Helvetica, sans-serif">Look for `reg add` and</text>
  <text x="160" y="365" fill="#6c4b12" font-size="18" font-family="Arial, Helvetica, sans-serif">Sysmon `12/13/14`</text>

  <rect x="980" y="220" width="280" height="150" rx="22" fill="#e7f7ef" stroke="#67b984" stroke-width="3"/>
  <text x="1045" y="270" fill="#123524" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Services</text>
  <text x="1010" y="312" fill="#274c3a" font-size="18" font-family="Arial, Helvetica, sans-serif">`sc.exe create` or `New-Service`</text>
  <text x="1010" y="340" fill="#274c3a" font-size="18" font-family="Arial, Helvetica, sans-serif">Watch `4697`, `7045`,</text>
  <text x="1010" y="365" fill="#274c3a" font-size="18" font-family="Arial, Helvetica, sans-serif">registry service paths</text>

  <rect x="150" y="610" width="260" height="150" rx="22" fill="#ffe1e1" stroke="#cf6a6a" stroke-width="3"/>
  <text x="190" y="660" fill="#5a1e1e" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Scheduled tasks</text>
  <text x="180" y="702" fill="#6f2a2a" font-size="18" font-family="Arial, Helvetica, sans-serif">`schtasks /create` or</text>
  <text x="180" y="727" fill="#6f2a2a" font-size="18" font-family="Arial, Helvetica, sans-serif">`New-ScheduledTask`</text>
  <text x="180" y="752" fill="#6f2a2a" font-size="18" font-family="Arial, Helvetica, sans-serif">Watch `4698`, `4702`, `106`, `140`</text>

  <rect x="960" y="610" width="300" height="150" rx="22" fill="#efe4ff" stroke="#8d72c9" stroke-width="3"/>
  <text x="1045" y="660" fill="#2f2057" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">PowerShell</text>
  <text x="1000" y="702" fill="#48326f" font-size="18" font-family="Arial, Helvetica, sans-serif">`4103`, `4104`, `iex`, `iwr`,</text>
  <text x="1000" y="727" fill="#48326f" font-size="18" font-family="Arial, Helvetica, sans-serif">and `EncodedCommand`</text>
  <text x="1000" y="752" fill="#48326f" font-size="18" font-family="Arial, Helvetica, sans-serif">often reveal the real action</text>

  <rect x="515" y="175" width="370" height="110" rx="22" fill="#dff7f5" stroke="#58a7a0" stroke-width="3"/>
  <text x="610" y="225" fill="#124645" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Execution chain</text>
  <text x="560" y="262" fill="#1e6461" font-size="18" font-family="Arial, Helvetica, sans-serif">Process path + parent + command line explains intent</text>

  <rect x="500" y="700" width="400" height="90" rx="20" fill="#f3f0ea" stroke="#97866a" stroke-width="3"/>
  <text x="545" y="755" fill="#433729" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Do not treat persistence in isolation</text>
  <text x="525" y="782" fill="#5d4d3a" font-size="17" font-family="Arial, Helvetica, sans-serif">Tie it back to the process, user, host, and network story.</text>

  <line x1="585" y1="400" x2="360" y2="330" stroke="#2a4d69" stroke-width="5" marker-end="url(#arrow2)"/>
  <line x1="810" y1="400" x2="980" y2="330" stroke="#2a4d69" stroke-width="5" marker-end="url(#arrow2)"/>
  <line x1="605" y1="555" x2="410" y2="640" stroke="#2a4d69" stroke-width="5" marker-end="url(#arrow2)"/>
  <line x1="795" y1="555" x2="960" y2="640" stroke="#2a4d69" stroke-width="5" marker-end="url(#arrow2)"/>
  <line x1="700" y1="355" x2="700" y2="285" stroke="#2a4d69" stroke-width="5" marker-end="url(#arrow2)"/>
</svg>
