<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420">
  <defs>
    <marker id="arrow-up" markerWidth="7" markerHeight="5" refX="3.5" refY="0" orient="auto">
      <path d="M0,5 L3.5,0 L7,5" fill="none" stroke="#4a5568" stroke-width="1"/>
    </marker>
    <marker id="arrow-down" markerWidth="7" markerHeight="5" refX="3.5" refY="5" orient="auto">
      <path d="M0,0 L3.5,5 L7,0" fill="none" stroke="#4a5568" stroke-width="1"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="420" fill="#0a0e17"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Three-Tier Web Application Architecture</text>

  <!-- Left side labels -->
  <text x="52" y="112" text-anchor="middle" fill="#4a5568" font-size="9" font-weight="600">Client-Side</text>
  <text x="52" y="232" text-anchor="middle" fill="#4a5568" font-size="9" font-weight="600">Server-Side</text>
  <text x="52" y="348" text-anchor="middle" fill="#4a5568" font-size="9" font-weight="600">Backend</text>

  <!-- Layer 1: Presentation Layer -->
  <rect x="90" y="56" width="440" height="76" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1.2"/>
  <text x="310" y="82" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Presentation Layer</text>
  <text x="310" y="102" text-anchor="middle" fill="#e2e8f0" font-size="11">Browser / Mobile App</text>
  <text x="310" y="120" text-anchor="middle" fill="#4a5568" font-size="9">HTML, CSS, JavaScript, DOM rendering</text>

  <!-- Attack box for Presentation Layer -->
  <rect x="554" y="68" width="196" height="50" rx="3" fill="#111827" stroke="#ff0040" stroke-width="0.8"/>
  <text x="652" y="85" text-anchor="middle" fill="#ff0040" font-size="9" font-weight="600">Attack Vectors</text>
  <text x="652" y="100" text-anchor="middle" fill="#ff0040" font-size="9" class="mono">XSS, CSRF, Clickjacking</text>
  <text x="652" y="112" text-anchor="middle" fill="#4a5568" font-size="8">Client-side injection</text>

  <!-- Connector line to attack box -->
  <line x1="530" y1="94" x2="554" y2="94" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Bidirectional arrow between Layer 1 and Layer 2 -->
  <line x1="300" y1="132" x2="300" y2="163" stroke="#4a5568" stroke-width="1" marker-end="url(#arrow-down)"/>
  <line x1="320" y1="163" x2="320" y2="132" stroke="#4a5568" stroke-width="1" marker-end="url(#arrow-up)"/>
  <text x="340" y="152" fill="#4a5568" font-size="8">HTTP / WebSocket</text>

  <!-- Layer 2: Application Layer -->
  <rect x="90" y="170" width="440" height="90" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1.2"/>
  <text x="310" y="198" text-anchor="middle" fill="#00ff41" font-size="13" font-weight="600">Application Layer</text>
  <text x="310" y="218" text-anchor="middle" fill="#e2e8f0" font-size="11">Web Server / API</text>
  <text x="310" y="236" text-anchor="middle" fill="#4a5568" font-size="9">Business logic, authentication, session management</text>
  <text x="310" y="250" text-anchor="middle" fill="#4a5568" font-size="9">Routing, middleware, request processing</text>

  <!-- Attack box for Application Layer -->
  <rect x="554" y="178" width="210" height="64" rx="3" fill="#111827" stroke="#ff0040" stroke-width="0.8"/>
  <text x="659" y="195" text-anchor="middle" fill="#ff0040" font-size="9" font-weight="600">Attack Vectors</text>
  <text x="659" y="210" text-anchor="middle" fill="#ff0040" font-size="9" class="mono">Injection, Auth Bypass</text>
  <text x="659" y="224" text-anchor="middle" fill="#ff0040" font-size="9" class="mono">SSRF, Deserialization</text>
  <text x="659" y="236" text-anchor="middle" fill="#4a5568" font-size="8">Server-side exploitation</text>

  <!-- Connector line to attack box -->
  <line x1="530" y1="215" x2="554" y2="215" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Bidirectional arrow between Layer 2 and Layer 3 -->
  <line x1="300" y1="260" x2="300" y2="291" stroke="#4a5568" stroke-width="1" marker-end="url(#arrow-down)"/>
  <line x1="320" y1="291" x2="320" y2="260" stroke="#4a5568" stroke-width="1" marker-end="url(#arrow-up)"/>
  <text x="340" y="280" fill="#4a5568" font-size="8">SQL / LDAP / FS</text>

  <!-- Layer 3: Data Layer -->
  <rect x="90" y="298" width="440" height="76" rx="3" fill="#111827" stroke="#ffb000" stroke-width="1.2"/>
  <text x="310" y="324" text-anchor="middle" fill="#ffb000" font-size="13" font-weight="600">Data Layer</text>
  <text x="310" y="344" text-anchor="middle" fill="#e2e8f0" font-size="11">Database / File System / LDAP</text>
  <text x="310" y="362" text-anchor="middle" fill="#4a5568" font-size="9">Persistent storage, directory services, caching</text>

  <!-- Attack box for Data Layer -->
  <rect x="554" y="304" width="210" height="58" rx="3" fill="#111827" stroke="#ff0040" stroke-width="0.8"/>
  <text x="659" y="321" text-anchor="middle" fill="#ff0040" font-size="9" font-weight="600">Attack Vectors</text>
  <text x="659" y="336" text-anchor="middle" fill="#ff0040" font-size="9" class="mono">SQLi, LDAPi, Path Traversal</text>
  <text x="659" y="350" text-anchor="middle" fill="#4a5568" font-size="8">Data-layer injection</text>

  <!-- Connector line to attack box -->
  <line x1="530" y1="336" x2="554" y2="336" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Copyright -->
  <text x="762" y="412" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>