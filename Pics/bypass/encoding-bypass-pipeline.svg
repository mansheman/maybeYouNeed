<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ff0040" stroke-width="1.2"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#00ff41" stroke-width="1.2"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ffb000" stroke-width="1.2"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4a5568" stroke-width="1.2"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" fill="#0a0e17"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Payload Transformation Pipeline - WAF Bypass</text>

  <!-- Step 1: Attacker Payload -->
  <rect x="16" y="120" width="130" height="70" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1.2"/>
  <text x="81" y="142" text-anchor="middle" fill="#ff0040" font-size="11" font-weight="600">Attacker Payload</text>
  <text x="81" y="160" text-anchor="middle" fill="#e2e8f0" font-size="8" class="mono">&lt;script&gt;</text>
  <text x="81" y="172" text-anchor="middle" fill="#e2e8f0" font-size="8" class="mono">alert(1)&lt;/script&gt;</text>

  <!-- Arrow 1 -->
  <line x1="146" y1="155" x2="172" y2="155" stroke="#ffb000" stroke-width="1" marker-end="url(#arr-amber)"/>

  <!-- Step 2: Encoding transformations -->
  <rect x="178" y="82" width="182" height="146" rx="3" fill="#111827" stroke="#ffb000" stroke-width="1.2"/>
  <text x="269" y="102" text-anchor="middle" fill="#ffb000" font-size="11" font-weight="600">Encoding</text>
  <line x1="194" y1="110" x2="344" y2="110" stroke="#1e293b" stroke-width="0.6"/>

  <text x="196" y="128" fill="#4a5568" font-size="9">URL:</text>
  <text x="234" y="128" fill="#e2e8f0" font-size="8" class="mono">%3Cscript%3E</text>

  <text x="196" y="146" fill="#4a5568" font-size="9">Double:</text>
  <text x="248" y="146" fill="#e2e8f0" font-size="8" class="mono">%253Cscript%253E</text>

  <text x="196" y="164" fill="#4a5568" font-size="9">Unicode:</text>
  <text x="254" y="164" fill="#e2e8f0" font-size="8" class="mono">\u003cscript\u003e</text>

  <text x="196" y="182" fill="#4a5568" font-size="9">HTML:</text>
  <text x="240" y="182" fill="#e2e8f0" font-size="8" class="mono">&amp;lt;script&amp;gt;</text>

  <text x="269" y="218" text-anchor="middle" fill="#4a5568" font-size="8">Transforms to evade pattern matching</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="155" x2="386" y2="155" stroke="#ffb000" stroke-width="1" marker-end="url(#arr-amber)"/>

  <!-- Step 3: WAF Check -->
  <rect x="392" y="110" width="110" height="90" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1.2"/>
  <text x="447" y="134" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">WAF Check</text>
  <line x1="406" y1="142" x2="488" y2="142" stroke="#1e293b" stroke-width="0.6"/>
  <text x="447" y="160" text-anchor="middle" fill="#4a5568" font-size="9">Pattern matching</text>
  <text x="447" y="174" text-anchor="middle" fill="#4a5568" font-size="9">Signature analysis</text>
  <text x="447" y="190" text-anchor="middle" fill="#4a5568" font-size="8">Regex / blocklist rules</text>

  <!-- BLOCKED PATH (top) -->
  <!-- Arrow up from WAF -->
  <line x1="447" y1="110" x2="447" y2="68" stroke="#ff0040" stroke-width="1" marker-end="url(#arr-red)"/>
  <text x="458" y="92" fill="#ff0040" font-size="8">Detected</text>

  <!-- Blocked box -->
  <rect x="392" y="38" width="110" height="30" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1.2"/>
  <text x="447" y="50" text-anchor="middle" fill="#ff0040" font-size="10" font-weight="600">Request Blocked</text>
  <text x="447" y="62" text-anchor="middle" fill="#ff0040" font-size="9">403 Forbidden</text>

  <!-- X mark -->
  <line x1="494" y1="42" x2="506" y2="62" stroke="#ff0040" stroke-width="1.5"/>
  <line x1="506" y1="42" x2="494" y2="62" stroke="#ff0040" stroke-width="1.5"/>

  <!-- BYPASSED PATH (bottom-right) -->
  <!-- Arrow right from WAF -->
  <line x1="502" y1="180" x2="502" y2="272" stroke="#00ff41" stroke-width="1"/>
  <line x1="502" y1="272" x2="530" y2="272" stroke="#00ff41" stroke-width="1" marker-end="url(#arr-green)"/>
  <text x="484" y="238" fill="#00ff41" font-size="8" transform="rotate(90,484,238)">Bypassed</text>

  <!-- Checkmark -->
  <text x="516" y="262" fill="#00ff41" font-size="10">&#x2713;</text>

  <!-- Web Application box -->
  <rect x="536" y="252" width="120" height="50" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1.2"/>
  <text x="596" y="274" text-anchor="middle" fill="#00ff41" font-size="11" font-weight="600">Web Application</text>
  <text x="596" y="290" text-anchor="middle" fill="#4a5568" font-size="8">Receives encoded input</text>

  <!-- Arrow to Decoder -->
  <line x1="656" y1="277" x2="680" y2="277" stroke="#4a5568" stroke-width="1" marker-end="url(#arr-gray)"/>

  <!-- Decoder box -->
  <rect x="686" y="252" width="96" height="50" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1.2"/>
  <text x="734" y="272" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="600">Decoder</text>
  <text x="734" y="286" text-anchor="middle" fill="#4a5568" font-size="8">Server decodes</text>
  <text x="734" y="296" text-anchor="middle" fill="#4a5568" font-size="8">the payload</text>

  <!-- Arrow to Executed payload -->
  <line x1="734" y1="302" x2="734" y2="318" stroke="#ff0040" stroke-width="1" marker-end="url(#arr-red)"/>

  <!-- Decoded payload executes -->
  <rect x="654" y="322" width="138" height="30" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1.2"/>
  <text x="723" y="337" text-anchor="middle" fill="#ff0040" font-size="8" font-weight="600">Decoded Payload Executes</text>
  <text x="723" y="348" text-anchor="middle" fill="#ff0040" font-size="7" class="mono">&lt;script&gt;alert(1)&lt;/script&gt;</text>

  <!-- Flow legend at bottom-left -->
  <text x="24" y="310" fill="#4a5568" font-size="8" font-weight="600">Flow:</text>
  <line x1="24" y1="320" x2="48" y2="320" stroke="#ff0040" stroke-width="1"/>
  <text x="54" y="324" fill="#4a5568" font-size="8">Blocked</text>
  <line x1="24" y1="336" x2="48" y2="336" stroke="#00ff41" stroke-width="1"/>
  <text x="54" y="340" fill="#4a5568" font-size="8">Bypassed</text>

  <!-- Copyright -->
  <text x="782" y="354" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>