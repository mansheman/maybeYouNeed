<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      .font-sans { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .font-mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0a0e17" rx="3"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" class="font-sans" fill="#e2e8f0" font-size="16" font-weight="600">PHP Serialization Format — Anatomy</text>

  <!-- ===== FULL SERIALIZED STRING (monospace, character-by-character colored) ===== -->
  <!-- O:4:"User":2:{s:4:"name";s:5:"Alice";s:4:"role";s:5:"admin";} -->
  <!-- Positioned at y=68, starting x=56. Each char ~9.6px wide in this font size -->

  <g class="font-mono" font-size="14">
    <!-- O -->
    <text x="56" y="68" fill="#00ff41">O</text>
    <!-- : -->
    <text x="65.6" y="68" fill="#4a5568">:</text>
    <!-- 4 -->
    <text x="75.2" y="68" fill="#00d4ff">4</text>
    <!-- : -->
    <text x="84.8" y="68" fill="#4a5568">:</text>
    <!-- "User" -->
    <text x="94.4" y="68" fill="#00d4ff">"User"</text>
    <!-- : -->
    <text x="152" y="68" fill="#4a5568">:</text>
    <!-- 2 -->
    <text x="161.6" y="68" fill="#ffb000">2</text>
    <!-- : -->
    <text x="171.2" y="68" fill="#4a5568">:</text>
    <!-- { -->
    <text x="180.8" y="68" fill="#4a5568">{</text>

    <!-- s:4:"name" -->
    <text x="190.4" y="68" fill="#00ff41">s:4:"name"</text>
    <!-- ; -->
    <text x="286.4" y="68" fill="#4a5568">;</text>
    <!-- s:5:"Alice" -->
    <text x="296" y="68" fill="#e2e8f0">s:5:"Alice"</text>
    <!-- ; -->
    <text x="401.6" y="68" fill="#4a5568">;</text>

    <!-- s:4:"role" -->
    <text x="411.2" y="68" fill="#00ff41">s:4:"role"</text>
    <!-- ; -->
    <text x="507.2" y="68" fill="#4a5568">;</text>
    <!-- s:5:"admin" -->
    <text x="516.8" y="68" fill="#e2e8f0">s:5:"admin"</text>
    <!-- ; -->
    <text x="622.4" y="68" fill="#4a5568">;</text>
    <!-- } -->
    <text x="632" y="68" fill="#4a5568">}</text>
  </g>

  <!-- ===== COLORED UNDERLINE BRACKETS + CONNECTOR LINES + LABELS ===== -->

  <!-- 1) "O" — type indicator -->
  <line x1="56" y1="75" x2="64" y2="75" stroke="#00ff41" stroke-width="1"/>
  <line x1="60" y1="75" x2="60" y2="95" stroke="#00ff41" stroke-width="1"/>
  <rect x="20" y="96" width="80" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="60" y="110" text-anchor="middle" class="font-sans" fill="#00ff41" font-size="10">Type: Object</text>

  <!-- 2) "4" — class name length -->
  <line x1="75" y1="75" x2="83" y2="75" stroke="#00d4ff" stroke-width="1"/>
  <line x1="79" y1="75" x2="79" y2="95" stroke="#00d4ff" stroke-width="1"/>
  <rect x="110" y="96" width="100" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="160" y="110" text-anchor="middle" class="font-sans" fill="#00d4ff" font-size="10">Name Length: 4</text>
  <line x1="79" y1="106" x2="110" y2="106" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 3) "User" — class name -->
  <line x1="94" y1="75" x2="152" y2="75" stroke="#00d4ff" stroke-width="1"/>
  <line x1="123" y1="75" x2="123" y2="130" stroke="#00d4ff" stroke-width="1"/>
  <rect x="80" y="131" width="100" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="130" y="145" text-anchor="middle" class="font-sans" fill="#00d4ff" font-size="10">Class: "User"</text>

  <!-- 4) "2" — property count -->
  <line x1="161" y1="75" x2="170" y2="75" stroke="#ffb000" stroke-width="1"/>
  <line x1="165" y1="75" x2="165" y2="130" stroke="#ffb000" stroke-width="1"/>
  <rect x="190" y="131" width="110" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="245" y="145" text-anchor="middle" class="font-sans" fill="#ffb000" font-size="10">Properties: 2</text>
  <line x1="165" y1="141" x2="190" y2="141" stroke="#ffb000" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 5) First property key: s:4:"name" -->
  <line x1="190" y1="75" x2="286" y2="75" stroke="#00ff41" stroke-width="1"/>
  <line x1="238" y1="75" x2="238" y2="170" stroke="#00ff41" stroke-width="1"/>
  <rect x="188" y="171" width="100" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="238" y="185" text-anchor="middle" class="font-sans" fill="#00ff41" font-size="10">Key: "name"</text>

  <!-- 6) First value: s:5:"Alice" -->
  <line x1="296" y1="75" x2="401" y2="75" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <line x1="348" y1="75" x2="348" y2="170" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <rect x="298" y="171" width="100" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="348" y="185" text-anchor="middle" class="font-sans" fill="#e2e8f0" font-size="10">Value: "Alice"</text>

  <!-- 7) Second property key: s:4:"role" -->
  <line x1="411" y1="75" x2="507" y2="75" stroke="#00ff41" stroke-width="1"/>
  <line x1="459" y1="75" x2="459" y2="170" stroke="#00ff41" stroke-width="1"/>
  <rect x="409" y="171" width="100" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="459" y="185" text-anchor="middle" class="font-sans" fill="#00ff41" font-size="10">Key: "role"</text>

  <!-- 8) Second value: s:5:"admin" -->
  <line x1="517" y1="75" x2="622" y2="75" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="75" x2="570" y2="170" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <rect x="520" y="171" width="100" height="20" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="570" y="185" text-anchor="middle" class="font-sans" fill="#e2e8f0" font-size="10">Value: "admin"</text>

  <!-- ===== BRACE GROUPING for properties ===== -->
  <rect x="185" y="200" width="440" height="22" rx="3" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="405" y="215" text-anchor="middle" class="font-sans" fill="#4a5568" font-size="9">Property Block  { key ; value ; key ; value ; }</text>

  <!-- ===== TYPE PREFIX REFERENCE TABLE ===== -->
  <rect x="30" y="240" width="340" height="130" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="200" y="260" text-anchor="middle" class="font-sans" fill="#e2e8f0" font-size="12" font-weight="600">Type Prefixes</text>
  <line x1="50" y1="268" x2="350" y2="268" stroke="#1e293b" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="60" y="288" class="font-mono" fill="#00ff41" font-size="11">s</text>
  <text x="80" y="288" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="95" y="288" class="font-sans" fill="#e2e8f0" font-size="11">String</text>

  <text x="200" y="288" class="font-mono" fill="#00ff41" font-size="11">i</text>
  <text x="220" y="288" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="235" y="288" class="font-sans" fill="#e2e8f0" font-size="11">Integer</text>

  <!-- Row 2 -->
  <text x="60" y="310" class="font-mono" fill="#00ff41" font-size="11">b</text>
  <text x="80" y="310" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="95" y="310" class="font-sans" fill="#e2e8f0" font-size="11">Boolean</text>

  <text x="200" y="310" class="font-mono" fill="#00ff41" font-size="11">a</text>
  <text x="220" y="310" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="235" y="310" class="font-sans" fill="#e2e8f0" font-size="11">Array</text>

  <!-- Row 3 -->
  <text x="60" y="332" class="font-mono" fill="#00ff41" font-size="11">O</text>
  <text x="80" y="332" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="95" y="332" class="font-sans" fill="#e2e8f0" font-size="11">Object</text>

  <text x="200" y="332" class="font-mono" fill="#00ff41" font-size="11">N</text>
  <text x="220" y="332" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="235" y="332" class="font-sans" fill="#e2e8f0" font-size="11">Null</text>

  <!-- Row 4 — extra types -->
  <text x="60" y="354" class="font-mono" fill="#00ff41" font-size="11">d</text>
  <text x="80" y="354" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="95" y="354" class="font-sans" fill="#e2e8f0" font-size="11">Double/Float</text>

  <text x="200" y="354" class="font-mono" fill="#00ff41" font-size="11">r</text>
  <text x="220" y="354" class="font-sans" fill="#4a5568" font-size="11">=</text>
  <text x="235" y="354" class="font-sans" fill="#e2e8f0" font-size="11">Reference</text>

  <!-- ===== PROPERTY VISIBILITY TABLE ===== -->
  <rect x="400" y="240" width="370" height="130" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="585" y="260" text-anchor="middle" class="font-sans" fill="#e2e8f0" font-size="12" font-weight="600">Property Visibility</text>
  <line x1="420" y1="268" x2="750" y2="268" stroke="#1e293b" stroke-width="1"/>

  <!-- public -->
  <text x="420" y="292" class="font-sans" fill="#00ff41" font-size="11" font-weight="600">public</text>
  <text x="500" y="292" class="font-mono" fill="#e2e8f0" font-size="11">name</text>
  <text x="420" y="307" class="font-sans" fill="#4a5568" font-size="9">Normal property name, no prefix</text>

  <!-- protected -->
  <text x="420" y="332" class="font-sans" fill="#ffb000" font-size="11" font-weight="600">protected</text>
  <text x="500" y="332" class="font-mono" fill="#e2e8f0" font-size="11">\x00*\x00</text>
  <text x="570" y="332" class="font-mono" fill="#4a5568" font-size="11">name</text>
  <text x="420" y="347" class="font-sans" fill="#4a5568" font-size="9">Null-byte + asterisk + null-byte prefix</text>

  <!-- private -->
  <text x="420" y="362" class="font-sans" fill="#ff0040" font-size="11" font-weight="600">private</text>
  <text x="500" y="362" class="font-mono" fill="#e2e8f0" font-size="11">\x00ClassName\x00</text>
  <text x="645" y="362" class="font-mono" fill="#4a5568" font-size="11">name</text>

  <!-- ===== STRUCTURAL LEGEND (bottom) ===== -->
  <rect x="30" y="388" width="740" height="72" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="400" y="408" text-anchor="middle" class="font-sans" fill="#e2e8f0" font-size="12" font-weight="600">Serialized String Structure</text>
  <line x1="50" y1="415" x2="750" y2="415" stroke="#1e293b" stroke-width="1"/>

  <text x="50" y="434" class="font-mono" fill="#00ff41" font-size="10">O</text>
  <text x="60" y="434" class="font-sans" fill="#4a5568" font-size="10">:</text>
  <text x="68" y="434" class="font-mono" fill="#00d4ff" font-size="10">&lt;name_len&gt;</text>
  <text x="138" y="434" class="font-sans" fill="#4a5568" font-size="10">:</text>
  <text x="146" y="434" class="font-mono" fill="#00d4ff" font-size="10">"&lt;class&gt;"</text>
  <text x="216" y="434" class="font-sans" fill="#4a5568" font-size="10">:</text>
  <text x="224" y="434" class="font-mono" fill="#ffb000" font-size="10">&lt;prop_count&gt;</text>
  <text x="310" y="434" class="font-sans" fill="#4a5568" font-size="10">:</text>
  <text x="318" y="434" class="font-mono" fill="#4a5568" font-size="10">{</text>
  <text x="328" y="434" class="font-mono" fill="#00ff41" font-size="10">&lt;key&gt;</text>
  <text x="362" y="434" class="font-sans" fill="#4a5568" font-size="10">;</text>
  <text x="372" y="434" class="font-mono" fill="#e2e8f0" font-size="10">&lt;value&gt;</text>
  <text x="420" y="434" class="font-sans" fill="#4a5568" font-size="10">; ... }</text>

  <text x="50" y="452" class="font-sans" fill="#4a5568" font-size="9">Colons separate fields. Semicolons terminate values. Strings use the format</text>
  <text x="444" y="452" class="font-mono" fill="#e2e8f0" font-size="9">s:&lt;length&gt;:"&lt;data&gt;"</text>
  <text x="558" y="452" class="font-sans" fill="#4a5568" font-size="9">where length is the byte count.</text>

  <!-- ===== COPYRIGHT ===== -->
  <text x="770" y="490" text-anchor="end" class="font-sans" fill="#4a5568" font-size="8" opacity="0.6">&#169; Abdulrahman Majid</text>

</svg>