<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00ff41"/>
    </marker>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
    <marker id="am" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="700" height="380" fill="#0a0e17" rx="4"/>

  <!-- Title -->
  <text x="350" y="28" style="font-size:14px;fill:#e2e8f0;text-anchor:middle;letter-spacing:1px;">Complete Serialization Cycle</text>
  <line x1="150" y1="38" x2="550" y2="38" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Application (center top) -->
  <rect x="260" y="55" width="180" height="50" rx="3" fill="#111827" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="78" style="font-size:12px;fill:#e2e8f0;text-anchor:middle;">Application</text>
  <text x="350" y="95" style="font-size:8px;fill:#4a5568;text-anchor:middle;">data source / consumer</text>

  <!-- Left: Serialize path -->
  <line x1="300" y1="110" x2="160" y2="150" stroke="#00ff41" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="215" y="135" style="font-size:8px;fill:#00ff41;text-anchor:middle;">encode</text>

  <rect x="60" y="155" width="160" height="50" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1"/>
  <text x="140" y="178" style="font-size:11px;fill:#00ff41;text-anchor:middle;">Serialize</text>
  <text x="140" y="195" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Object → bytes</text>

  <line x1="140" y1="210" x2="140" y2="245" stroke="#00ff41" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="60" y="250" width="160" height="45" rx="3" fill="#111827" stroke="#4a5568" stroke-width="1"/>
  <text x="140" y="272" style="font-size:11px;fill:#e2e8f0;text-anchor:middle;">Serialized Data</text>
  <text x="140" y="288" style="font-size:8px;fill:#4a5568;text-anchor:middle;">binary / JSON / XML</text>

  <!-- Transmit arrow -->
  <line x1="225" y1="272" x2="475" y2="272" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#am)"/>
  <text x="350" y="264" style="font-size:8px;fill:#4a5568;text-anchor:middle;">transmit / store</text>

  <!-- Right: Deserialize path -->
  <rect x="480" y="250" width="160" height="45" rx="3" fill="#111827" stroke="#4a5568" stroke-width="1"/>
  <text x="560" y="272" style="font-size:11px;fill:#e2e8f0;text-anchor:middle;">Serialized Data</text>
  <text x="560" y="288" style="font-size:8px;fill:#4a5568;text-anchor:middle;">from source</text>

  <line x1="560" y1="245" x2="560" y2="210" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#ac)"/>

  <rect x="480" y="155" width="160" height="50" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1"/>
  <text x="560" y="178" style="font-size:11px;fill:#00d4ff;text-anchor:middle;">Deserialize</text>
  <text x="560" y="195" style="font-size:8px;fill:#4a5568;text-anchor:middle;">bytes → Object</text>

  <line x1="540" y1="150" x2="400" y2="110" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="485" y="135" style="font-size:8px;fill:#00d4ff;text-anchor:middle;">decode</text>

  <!-- Destinations -->
  <rect x="60" y="310" width="110" height="35" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.5"/>
  <text x="115" y="332" style="font-size:9px;fill:#4a5568;text-anchor:middle;">File / DB</text>

  <rect x="530" y="310" width="110" height="35" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.5"/>
  <text x="585" y="332" style="font-size:9px;fill:#4a5568;text-anchor:middle;">Network / API</text>

  <!-- Legend -->
  <rect x="255" y="315" width="190" height="45" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.5"/>
  <rect x="270" y="328" width="8" height="8" rx="1" fill="none" stroke="#00ff41" stroke-width="1"/>
  <text x="285" y="336" style="font-size:8px;fill:#4a5568;">Serialize</text>
  <rect x="340" y="328" width="8" height="8" rx="1" fill="none" stroke="#00d4ff" stroke-width="1"/>
  <text x="355" y="336" style="font-size:8px;fill:#4a5568;">Deserialize</text>
  <rect x="270" y="343" width="8" height="8" rx="1" fill="none" stroke="#4a5568" stroke-width="1"/>
  <text x="285" y="351" style="font-size:8px;fill:#4a5568;">Data / Transport</text>

  <!-- Copyright -->
  <text x="680" y="373" style="font-size:8px;fill:#4a5568;text-anchor:end;opacity:0.6;">&#169; Abdulrahman Majid</text>
</svg>