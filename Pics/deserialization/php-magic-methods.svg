<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00ff41"/>
    </marker>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
    <marker id="aa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffb000"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff0040"/>
    </marker>
    <marker id="am" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="800" height="450" fill="#0a0e17" rx="4"/>

  <!-- Title -->
  <text x="400" y="28" style="font-size:14px;fill:#e2e8f0;text-anchor:middle;letter-spacing:1px;">PHP Magic Methods — Serialization Lifecycle</text>
  <line x1="180" y1="38" x2="620" y2="38" stroke="#1e293b" stroke-width="0.5"/>

  <!-- ============================================================ -->
  <!-- PHASE 1: Creation (green)                                     -->
  <!-- ============================================================ -->
  <rect x="22" y="60" width="162" height="150" rx="3" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>
  <text x="103" y="77" style="font-size:9px;fill:#00ff41;text-anchor:middle;letter-spacing:0.5px;opacity:0.7;">CREATION</text>

  <!-- Code box -->
  <rect x="32" y="88" width="142" height="34" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1"/>
  <text x="103" y="110" class="mono" style="font-size:11px;fill:#00ff41;text-anchor:middle;">new Object()</text>

  <!-- Magic method -->
  <rect x="32" y="134" width="142" height="30" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="103" y="154" class="mono" style="font-size:10px;fill:#e2e8f0;text-anchor:middle;">__construct()</text>

  <!-- Note -->
  <text x="103" y="185" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Normal instantiation</text>

  <!-- Arrow: Phase 1 to Phase 2 -->
  <line x1="189" y1="105" x2="223" y2="105" stroke="#00ff41" stroke-width="1" marker-end="url(#ag)"/>

  <!-- ============================================================ -->
  <!-- PHASE 2: Serialization (cyan)                                 -->
  <!-- ============================================================ -->
  <rect x="228" y="60" width="162" height="190" rx="3" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
  <text x="309" y="77" style="font-size:9px;fill:#00d4ff;text-anchor:middle;letter-spacing:0.5px;opacity:0.7;">SERIALIZATION</text>

  <!-- Code box -->
  <rect x="238" y="88" width="142" height="34" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1"/>
  <text x="309" y="110" class="mono" style="font-size:11px;fill:#00d4ff;text-anchor:middle;">serialize($obj)</text>

  <!-- Magic method -->
  <rect x="238" y="134" width="142" height="30" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="309" y="154" class="mono" style="font-size:10px;fill:#e2e8f0;text-anchor:middle;">__sleep()</text>

  <!-- Note -->
  <text x="309" y="185" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Called before serialization</text>

  <!-- Arrow down to serialized string -->
  <line x1="309" y1="169" x2="309" y2="204" stroke="#4a5568" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#am)"/>

  <!-- Serialized string box -->
  <rect x="245" y="208" width="128" height="30" rx="3" fill="#111827" stroke="#4a5568" stroke-width="0.5"/>
  <text x="309" y="221" class="mono" style="font-size:8px;fill:#4a5568;text-anchor:middle;">O:4:"User":1:{</text>
  <text x="309" y="233" class="mono" style="font-size:8px;fill:#4a5568;text-anchor:middle;">s:4:"name"...}</text>

  <!-- Arrow: Phase 2 to Phase 3 -->
  <line x1="395" y1="105" x2="429" y2="105" stroke="#00d4ff" stroke-width="1" marker-end="url(#ac)"/>

  <!-- ============================================================ -->
  <!-- PHASE 3: Deserialization (amber) — DANGER ZONE                -->
  <!-- ============================================================ -->
  <rect x="434" y="56" width="172" height="202" rx="3" fill="none" stroke="#ffb000" stroke-width="1" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="520" y="73" style="font-size:9px;fill:#ffb000;text-anchor:middle;letter-spacing:0.5px;">DESERIALIZATION</text>

  <!-- Code box -->
  <rect x="444" y="88" width="152" height="34" rx="3" fill="#111827" stroke="#ffb000" stroke-width="1"/>
  <text x="520" y="110" class="mono" style="font-size:10px;fill:#ffb000;text-anchor:middle;">unserialize($data)</text>

  <!-- Magic method -->
  <rect x="444" y="134" width="152" height="30" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="520" y="154" class="mono" style="font-size:10px;fill:#e2e8f0;text-anchor:middle;">__wakeup()</text>

  <!-- Note -->
  <text x="520" y="185" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Called on reconstruction</text>

  <!-- Danger annotation -->
  <rect x="450" y="200" width="140" height="22" rx="3" fill="#111827" stroke="#ff0040" stroke-width="0.5" opacity="0.8"/>
  <text x="520" y="215" style="font-size:8px;fill:#ff0040;text-anchor:middle;">Attacker controls input here</text>

  <!-- Small attack icon (exclamation) -->
  <circle cx="462" cy="211" r="6" fill="none" stroke="#ff0040" stroke-width="0.5" opacity="0.5"/>
  <text x="462" y="214" style="font-size:8px;fill:#ff0040;text-anchor:middle;font-weight:bold;">!</text>

  <!-- Danger zone label -->
  <text x="520" y="248" style="font-size:7px;fill:#ffb000;text-anchor:middle;letter-spacing:1.5px;opacity:0.5;">DANGER ZONE</text>

  <!-- Arrow: Phase 3 to Phase 4 -->
  <line x1="611" y1="105" x2="643" y2="105" stroke="#ffb000" stroke-width="1" marker-end="url(#aa)"/>

  <!-- ============================================================ -->
  <!-- PHASE 4: Destruction (red)                                    -->
  <!-- ============================================================ -->
  <rect x="648" y="60" width="132" height="150" rx="3" fill="none" stroke="#ff0040" stroke-width="0.5" opacity="0.2"/>
  <text x="714" y="77" style="font-size:9px;fill:#ff0040;text-anchor:middle;letter-spacing:0.5px;opacity:0.7;">DESTRUCTION</text>

  <!-- Code box -->
  <rect x="653" y="88" width="122" height="34" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1"/>
  <text x="714" y="105" style="font-size:9px;fill:#ff0040;text-anchor:middle;">Script ends /</text>
  <text x="714" y="117" class="mono" style="font-size:9px;fill:#ff0040;text-anchor:middle;">unset()</text>

  <!-- Magic method -->
  <rect x="653" y="134" width="122" height="30" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="714" y="154" class="mono" style="font-size:10px;fill:#e2e8f0;text-anchor:middle;">__destruct()</text>

  <!-- Note -->
  <text x="714" y="185" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Automatic cleanup</text>

  <!-- ============================================================ -->
  <!-- Timeline base line                                            -->
  <!-- ============================================================ -->
  <line x1="40" y1="278" x2="770" y2="278" stroke="#1e293b" stroke-width="0.5"/>

  <!-- ============================================================ -->
  <!-- Additional Magic Methods — Triggered During Object Use        -->
  <!-- ============================================================ -->
  <text x="400" y="300" style="font-size:10px;fill:#4a5568;text-anchor:middle;letter-spacing:0.5px;">Triggered During Object Use</text>

  <!-- __toString() -->
  <rect x="62" y="316" width="200" height="52" rx="3" fill="#111827" stroke="#4a5568" stroke-width="0.5"/>
  <text x="162" y="338" class="mono" style="font-size:10px;fill:#bf00ff;text-anchor:middle;">__toString()</text>
  <text x="162" y="356" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Object used as string</text>

  <!-- __call() -->
  <rect x="300" y="316" width="200" height="52" rx="3" fill="#111827" stroke="#4a5568" stroke-width="0.5"/>
  <text x="400" y="338" class="mono" style="font-size:10px;fill:#bf00ff;text-anchor:middle;">__call()</text>
  <text x="400" y="356" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Nonexistent method called</text>

  <!-- __get() -->
  <rect x="538" y="316" width="200" height="52" rx="3" fill="#111827" stroke="#4a5568" stroke-width="0.5"/>
  <text x="638" y="338" class="mono" style="font-size:10px;fill:#bf00ff;text-anchor:middle;">__get()</text>
  <text x="638" y="356" style="font-size:8px;fill:#4a5568;text-anchor:middle;">Nonexistent property read</text>

  <!-- Connector lines from Phase 3 down to additional methods section -->
  <line x1="520" y1="260" x2="520" y2="278" stroke="#4a5568" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="162" y1="278" x2="162" y2="311" stroke="#4a5568" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="400" y1="278" x2="400" y2="311" stroke="#4a5568" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="638" y1="278" x2="638" y2="311" stroke="#4a5568" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ============================================================ -->
  <!-- Flow annotation on deserialization attack surface              -->
  <!-- ============================================================ -->
  <path d="M 520 228 Q 520 260 620 260 Q 714 260 714 215" stroke="#ff0040" stroke-width="0.5" fill="none" stroke-dasharray="4,3" marker-end="url(#ar)" opacity="0.5"/>
  <text x="630" y="256" style="font-size:7px;fill:#ff0040;text-anchor:middle;opacity:0.6;">chains to</text>

  <!-- Copyright -->
  <text x="782" y="440" style="font-size:8px;fill:#4a5568;text-anchor:end;opacity:0.6;">&#169; Abdulrahman Majid</text>
</svg>