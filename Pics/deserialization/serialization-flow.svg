<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00ff41"/>
    </marker>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
    <marker id="am" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="720" height="340" fill="#0a0e17" rx="4"/>

  <!-- Title -->
  <text x="360" y="30" style="font-size:14px;fill:#e2e8f0;text-anchor:middle;letter-spacing:1px;">Serialization / Deserialization Flow</text>
  <line x1="140" y1="40" x2="580" y2="40" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Object (source) -->
  <rect x="40" y="70" width="160" height="70" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1"/>
  <text x="120" y="98" style="font-size:12px;fill:#00ff41;text-anchor:middle;">Python Object</text>
  <text x="120" y="118" style="font-size:9px;fill:#4a5568;text-anchor:middle;">name="admin", age=25</text>

  <!-- Arrow: serialize -->
  <line x1="205" y1="105" x2="285" y2="105" stroke="#00ff41" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="245" y="97" style="font-size:9px;fill:#00ff41;text-anchor:middle;">serialize</text>

  <!-- Serialized data (top) -->
  <rect x="290" y="70" width="160" height="70" rx="3" fill="#111827" stroke="#4a5568" stroke-width="1"/>
  <text x="370" y="98" style="font-size:12px;fill:#e2e8f0;text-anchor:middle;">Serialized Data</text>
  <text x="370" y="118" style="font-size:9px;fill:#4a5568;text-anchor:middle;">JSON / Binary / Pickle</text>

  <!-- Arrow: transmit (down) -->
  <line x1="370" y1="145" x2="370" y2="195" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#am)"/>
  <text x="400" y="175" style="font-size:9px;fill:#4a5568;text-anchor:start;">transmit</text>

  <!-- Serialized data (bottom) -->
  <rect x="290" y="200" width="160" height="70" rx="3" fill="#111827" stroke="#4a5568" stroke-width="1"/>
  <text x="370" y="228" style="font-size:12px;fill:#e2e8f0;text-anchor:middle;">Serialized Data</text>
  <text x="370" y="248" style="font-size:9px;fill:#4a5568;text-anchor:middle;">from file / network</text>

  <!-- Arrow: deserialize -->
  <line x1="285" y1="235" x2="205" y2="235" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="245" y="227" style="font-size:9px;fill:#00d4ff;text-anchor:middle;">deserialize</text>

  <!-- Reconstructed object -->
  <rect x="40" y="200" width="160" height="70" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1"/>
  <text x="120" y="228" style="font-size:12px;fill:#00d4ff;text-anchor:middle;">Reconstructed</text>
  <text x="120" y="248" style="font-size:9px;fill:#4a5568;text-anchor:middle;">name="admin", age=25</text>

  <!-- Legend -->
  <rect x="500" y="70" width="190" height="120" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.5"/>
  <text x="595" y="92" style="font-size:10px;fill:#e2e8f0;text-anchor:middle;">Formats</text>
  <text x="515" y="112" style="font-size:9px;fill:#4a5568;">JSON  - text-based</text>
  <text x="515" y="128" style="font-size:9px;fill:#4a5568;">Pickle - Python binary</text>
  <text x="515" y="144" style="font-size:9px;fill:#4a5568;">Java  - ObjectOutputStream</text>
  <text x="515" y="160" style="font-size:9px;fill:#4a5568;">XML   - text-based markup</text>
  <text x="515" y="176" style="font-size:9px;fill:#4a5568;">Protobuf - compact binary</text>

  <!-- Copyright -->
  <text x="700" y="330" style="font-size:8px;fill:#4a5568;text-anchor:end;opacity:0.6;">&#169; Abdulrahman Majid</text>
</svg>