<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00ff41"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff0040"/>
    </marker>
  </defs>

  <rect width="800" height="350" fill="#0a0e17" rx="4"/>

  <!-- Title -->
  <text x="400" y="28" style="font-size:14px;fill:#e2e8f0;text-anchor:middle;letter-spacing:1px;">Gadget Chain Concept</text>
  <line x1="180" y1="38" x2="620" y2="38" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Trigger -->
  <rect x="280" y="50" width="240" height="40" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1"/>
  <text x="400" y="68" style="font-size:11px;fill:#ff0040;text-anchor:middle;">readObject() — trigger</text>
  <text x="400" y="82" style="font-size:8px;fill:#4a5568;text-anchor:middle;">deserialization entry point</text>

  <!-- Arrow down -->
  <line x1="400" y1="93" x2="400" y2="118" stroke="#ff0040" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Chain container (subtle) -->
  <rect x="25" y="123" width="750" height="110" rx="4" fill="none" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="6,4"/>

  <!-- Gadget 1 -->
  <rect x="40" y="135" width="140" height="85" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1"/>
  <text x="110" y="158" style="font-size:10px;fill:#00ff41;text-anchor:middle;">Gadget 1</text>
  <text x="110" y="176" style="font-size:9px;fill:#4a5568;text-anchor:middle;">hashCode()</text>
  <text x="110" y="192" style="font-size:9px;fill:#4a5568;text-anchor:middle;">readObject()</text>
  <text x="110" y="210" style="font-size:8px;fill:#1e293b;text-anchor:middle;">entry</text>

  <line x1="185" y1="177" x2="220" y2="177" stroke="#00ff41" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Gadget 2 -->
  <rect x="225" y="135" width="140" height="85" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1" opacity="0.8"/>
  <text x="295" y="158" style="font-size:10px;fill:#00ff41;text-anchor:middle;opacity:0.8;">Gadget 2</text>
  <text x="295" y="176" style="font-size:9px;fill:#4a5568;text-anchor:middle;">invoke()</text>
  <text x="295" y="192" style="font-size:9px;fill:#4a5568;text-anchor:middle;">transform()</text>
  <text x="295" y="210" style="font-size:8px;fill:#1e293b;text-anchor:middle;">chain</text>

  <line x1="370" y1="177" x2="405" y2="177" stroke="#00ff41" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Gadget 3 -->
  <rect x="410" y="135" width="140" height="85" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1" opacity="0.6"/>
  <text x="480" y="158" style="font-size:10px;fill:#00ff41;text-anchor:middle;opacity:0.8;">Gadget 3</text>
  <text x="480" y="176" style="font-size:9px;fill:#4a5568;text-anchor:middle;">Method.invoke()</text>
  <text x="480" y="192" style="font-size:9px;fill:#4a5568;text-anchor:middle;">getRuntime()</text>
  <text x="480" y="210" style="font-size:8px;fill:#1e293b;text-anchor:middle;">bridge</text>

  <line x1="555" y1="177" x2="590" y2="177" stroke="#00ff41" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Gadget N (sink) -->
  <rect x="595" y="135" width="165" height="85" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1"/>
  <text x="678" y="158" style="font-size:10px;fill:#ff0040;text-anchor:middle;">Gadget N — sink</text>
  <text x="678" y="176" style="font-size:9px;fill:#ff0040;text-anchor:middle;">Runtime.exec()</text>
  <text x="678" y="192" style="font-size:9px;fill:#4a5568;text-anchor:middle;">arbitrary command</text>
  <text x="678" y="210" style="font-size:8px;fill:#1e293b;text-anchor:middle;">RCE</text>

  <!-- Info section -->
  <rect x="25" y="250" width="750" height="80" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.5"/>

  <text x="45" y="272" style="font-size:9px;fill:#e2e8f0;">What are gadgets?</text>
  <text x="45" y="288" style="font-size:9px;fill:#4a5568;">Existing code in app libraries — chained via method calls, reflection, and proxies</text>
  <text x="45" y="304" style="font-size:9px;fill:#4a5568;">Each gadget calls the next: toString() / hashCode() / compareTo() / invoke()</text>

  <text x="500" y="272" style="font-size:9px;fill:#e2e8f0;">Common libraries</text>
  <text x="500" y="288" style="font-size:9px;fill:#4a5568;">CommonsCollections 3.1 | Spring</text>
  <text x="500" y="304" style="font-size:9px;fill:#4a5568;">Hibernate | Groovy | JDK</text>
  <text x="500" y="320" style="font-size:9px;fill:#4a5568;">Tools: ysoserial | PHPGGC</text>

  <!-- Copyright -->
  <text x="780" y="343" style="font-size:8px;fill:#4a5568;text-anchor:end;opacity:0.6;">&#169; Abdulrahman Majid</text>
</svg>