<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 360">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff0040"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="750" height="360" fill="#0a0e17" rx="4"/>

  <!-- Title -->
  <text x="375" y="28" style="font-size:14px;fill:#e2e8f0;text-anchor:middle;letter-spacing:1px;">How ysoserial Works</text>
  <line x1="200" y1="38" x2="550" y2="38" stroke="#1e293b" stroke-width="0.5"/>

  <!-- ysoserial tool -->
  <rect x="30" y="60" width="160" height="60" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1"/>
  <text x="110" y="85" style="font-size:11px;fill:#ff0040;text-anchor:middle;">ysoserial</text>
  <text x="110" y="103" style="font-size:8px;fill:#4a5568;text-anchor:middle;">payload generator</text>

  <!-- Arrow -->
  <line x1="195" y1="90" x2="245" y2="90" stroke="#ff0040" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="220" y="82" style="font-size:8px;fill:#4a5568;text-anchor:middle;">generate</text>

  <!-- Payload -->
  <rect x="250" y="60" width="160" height="60" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1" opacity="0.7"/>
  <text x="330" y="85" style="font-size:11px;fill:#e2e8f0;text-anchor:middle;">Serialized Payload</text>
  <text x="330" y="103" style="font-size:8px;fill:#4a5568;text-anchor:middle;">malicious .ser bytes</text>

  <!-- Arrow -->
  <line x1="415" y1="90" x2="465" y2="90" stroke="#ff0040" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="440" y="82" style="font-size:8px;fill:#4a5568;text-anchor:middle;">send</text>

  <!-- Vulnerable app -->
  <rect x="470" y="60" width="140" height="60" rx="3" fill="#111827" stroke="#4a5568" stroke-width="1"/>
  <text x="540" y="85" style="font-size:11px;fill:#e2e8f0;text-anchor:middle;">Victim App</text>
  <text x="540" y="103" style="font-size:8px;fill:#4a5568;text-anchor:middle;">deserializes input</text>

  <!-- Arrow down -->
  <line x1="540" y1="125" x2="540" y2="160" stroke="#ff0040" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- RCE -->
  <rect x="470" y="165" width="140" height="50" rx="3" fill="#1a0a10" stroke="#ff0040" stroke-width="1"/>
  <text x="540" y="190" style="font-size:12px;fill:#ff0040;text-anchor:middle;">RCE</text>
  <text x="540" y="206" style="font-size:8px;fill:#4a5568;text-anchor:middle;">command executed</text>

  <!-- Usage panel -->
  <rect x="30" y="150" width="400" height="85" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.5"/>
  <text x="230" y="170" style="font-size:10px;fill:#e2e8f0;text-anchor:middle;">Usage</text>
  <line x1="45" y1="178" x2="415" y2="178" stroke="#1e293b" stroke-width="0.5"/>

  <text x="45" y="196" style="font-size:9px;fill:#4a5568;">$ java -jar ysoserial.jar [gadget] [command]</text>
  <text x="45" y="214" style="font-size:9px;fill:#4a5568;">$ java -jar ysoserial.jar CommonsCollections1 "whoami"</text>
  <text x="45" y="230" style="font-size:9px;fill:#4a5568;">$ java -jar ysoserial.jar Spring1 "id" | base64</text>

  <!-- Gadget chains panel -->
  <rect x="30" y="250" width="690" height="80" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.5"/>
  <text x="375" y="270" style="font-size:10px;fill:#e2e8f0;text-anchor:middle;">Available Gadget Chains</text>
  <line x1="45" y1="278" x2="705" y2="278" stroke="#1e293b" stroke-width="0.5"/>

  <text x="55" y="296" style="font-size:9px;fill:#4a5568;">CommonsCollections1-6</text>
  <text x="55" y="312" style="font-size:9px;fill:#4a5568;">CommonsCollections7</text>

  <text x="245" y="296" style="font-size:9px;fill:#4a5568;">Spring1 / Spring2</text>
  <text x="245" y="312" style="font-size:9px;fill:#4a5568;">Hibernate1 / Hibernate2</text>

  <text x="435" y="296" style="font-size:9px;fill:#4a5568;">Jdk7u21 / Jre8u20</text>
  <text x="435" y="312" style="font-size:9px;fill:#4a5568;">Groovy1 / BeanShell1</text>

  <text x="605" y="296" style="font-size:9px;fill:#4a5568;">Variants:</text>
  <text x="605" y="312" style="font-size:9px;fill:#4a5568;">ysoserial.net (.NET)</text>

  <!-- Copyright -->
  <text x="730" y="352" style="font-size:8px;fill:#4a5568;text-anchor:end;opacity:0.6;">&#169; Abdulrahman Majid</text>
</svg>