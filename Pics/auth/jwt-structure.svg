<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ff0040"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="750" height="400" fill="#0a0e17"/>

  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">JWT Structure (JSON Web Token)</text>

  <!-- Full JWT string -->
  <rect x="30" y="42" width="690" height="34" rx="3" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="375" y="64" text-anchor="middle" font-size="9" class="mono">
    <tspan fill="#00d4ff">eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9</tspan>
    <tspan fill="#4a5568">.</tspan>
    <tspan fill="#00ff41">eyJzdWIiOiIxMjM0IiwibmFtZSI6ImFkbWluIn0</tspan>
    <tspan fill="#4a5568">.</tspan>
    <tspan fill="#ffb000">SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c</tspan>
  </text>

  <!-- Bracket labels under JWT string -->
  <line x1="68" y1="80" x2="68" y2="87" stroke="#00d4ff" stroke-width="0.8"/>
  <line x1="68" y1="87" x2="200" y2="87" stroke="#00d4ff" stroke-width="0.8"/>
  <line x1="200" y1="80" x2="200" y2="87" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="134" y="97" text-anchor="middle" fill="#00d4ff" font-size="8">Header</text>

  <line x1="215" y1="80" x2="215" y2="87" stroke="#00ff41" stroke-width="0.8"/>
  <line x1="215" y1="87" x2="440" y2="87" stroke="#00ff41" stroke-width="0.8"/>
  <line x1="440" y1="80" x2="440" y2="87" stroke="#00ff41" stroke-width="0.8"/>
  <text x="328" y="97" text-anchor="middle" fill="#00ff41" font-size="8">Payload</text>

  <line x1="455" y1="80" x2="455" y2="87" stroke="#ffb000" stroke-width="0.8"/>
  <line x1="455" y1="87" x2="680" y2="87" stroke="#ffb000" stroke-width="0.8"/>
  <line x1="680" y1="80" x2="680" y2="87" stroke="#ffb000" stroke-width="0.8"/>
  <text x="568" y="97" text-anchor="middle" fill="#ffb000" font-size="8">Signature</text>

  <!-- Decoded boxes -->
  <!-- Header box -->
  <rect x="30" y="112" width="210" height="80" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1"/>
  <text x="135" y="130" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="600">Header</text>
  <line x1="30" y1="138" x2="240" y2="138" stroke="#1e293b" stroke-width="0.6"/>
  <text x="45" y="155" fill="#e2e8f0" font-size="9" class="mono">{</text>
  <text x="55" y="168" fill="#e2e8f0" font-size="9" class="mono">"alg": "<tspan fill="#00d4ff">HS256</tspan>",</text>
  <text x="55" y="181" fill="#e2e8f0" font-size="9" class="mono">"typ": "<tspan fill="#00d4ff">JWT</tspan>"</text>
  <text x="45" y="192" fill="#e2e8f0" font-size="9" class="mono">}</text>

  <!-- Payload box -->
  <rect x="260" y="112" width="230" height="80" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1"/>
  <text x="375" y="130" text-anchor="middle" fill="#00ff41" font-size="11" font-weight="600">Payload (Claims)</text>
  <line x1="260" y1="138" x2="490" y2="138" stroke="#1e293b" stroke-width="0.6"/>
  <text x="275" y="155" fill="#e2e8f0" font-size="9" class="mono">{</text>
  <text x="285" y="168" fill="#e2e8f0" font-size="9" class="mono">"sub": "<tspan fill="#00ff41">1234</tspan>",</text>
  <text x="285" y="181" fill="#e2e8f0" font-size="9" class="mono">"name": "<tspan fill="#00ff41">admin</tspan>",</text>
  <text x="275" y="192" fill="#e2e8f0" font-size="9" class="mono">}</text>

  <!-- Signature box -->
  <rect x="510" y="112" width="210" height="80" rx="3" fill="#111827" stroke="#ffb000" stroke-width="1"/>
  <text x="615" y="130" text-anchor="middle" fill="#ffb000" font-size="11" font-weight="600">Signature</text>
  <line x1="510" y1="138" x2="720" y2="138" stroke="#1e293b" stroke-width="0.6"/>
  <text x="525" y="156" fill="#e2e8f0" font-size="8" class="mono">HMACSHA256(</text>
  <text x="535" y="169" fill="#e2e8f0" font-size="8" class="mono">base64(header) + "."</text>
  <text x="535" y="182" fill="#e2e8f0" font-size="8" class="mono">+ base64(payload),</text>
  <text x="535" y="195" fill="#ffb000" font-size="8" class="mono">secret</text>
  <text x="525" y="195" fill="#e2e8f0" font-size="8" class="mono">)</text>

  <!-- Separator -->
  <line x1="30" y1="215" x2="720" y2="215" stroke="#1e293b" stroke-width="0.6"/>

  <!-- None Algorithm Attack Section -->
  <rect x="30" y="230" width="690" height="145" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1.2"/>
  <text x="50" y="252" fill="#ff0040" font-size="12" font-weight="700">None Algorithm Attack</text>
  <text x="305" y="252" fill="#4a5568" font-size="9">CWE-345: Insufficient Verification of Data Authenticity</text>

  <line x1="30" y1="262" x2="720" y2="262" stroke="#1e293b" stroke-width="0.6"/>

  <!-- Original header -->
  <text x="50" y="283" fill="#4a5568" font-size="9">Original header:</text>
  <rect x="160" y="272" width="220" height="18" rx="3" fill="#0a0e17" stroke="#1e293b" stroke-width="0.5"/>
  <text x="170" y="285" fill="#e2e8f0" font-size="9" class="mono">{"alg": "<tspan fill="#00d4ff">HS256</tspan>", "typ": "JWT"}</text>

  <!-- Arrow -->
  <line x1="275" y1="296" x2="275" y2="310" stroke="#ff0040" stroke-width="1" marker-end="url(#arrow-red)"/>
  <text x="290" y="306" fill="#ff0040" font-size="8">tamper</text>

  <!-- Mutated header -->
  <text x="50" y="328" fill="#4a5568" font-size="9">Mutated header:</text>
  <rect x="160" y="317" width="220" height="18" rx="3" fill="#0a0e17" stroke="#ff0040" stroke-width="0.8"/>
  <text x="170" y="330" fill="#e2e8f0" font-size="9" class="mono">{"alg": "<tspan fill="#ff0040">none</tspan>", "typ": "JWT"}</text>

  <!-- Result -->
  <text x="50" y="358" fill="#4a5568" font-size="9">Forged token:</text>
  <rect x="160" y="347" width="380" height="18" rx="3" fill="#0a0e17" stroke="#ff0040" stroke-width="0.5"/>
  <text x="170" y="360" font-size="9" class="mono">
    <tspan fill="#ff0040">eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0</tspan>
    <tspan fill="#4a5568">.</tspan>
    <tspan fill="#00ff41">eyJzdWIiOiIxMjM0IiwibmFtZSI6ImFkbWluIn0</tspan>
    <tspan fill="#4a5568">.</tspan>
  </text>

  <!-- Signature removed note -->
  <text x="558" y="360" fill="#ff0040" font-size="8" font-weight="600">signature removed</text>

  <!-- Copyright -->
  <text x="738" y="394" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>