<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00ff41"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ffb000"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="#0a0e17"/>

  <!-- Column headers -->
  <rect x="50" y="20" width="120" height="32" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1"/>
  <text x="110" y="41" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">User Agent</text>

  <rect x="230" y="20" width="120" height="32" rx="3" fill="#111827" stroke="#00ff41" stroke-width="1"/>
  <text x="290" y="41" text-anchor="middle" fill="#00ff41" font-size="12" font-weight="600">Client App</text>

  <rect x="440" y="20" width="120" height="32" rx="3" fill="#111827" stroke="#ffb000" stroke-width="1"/>
  <text x="500" y="41" text-anchor="middle" fill="#ffb000" font-size="12" font-weight="600">Auth Server</text>

  <rect x="640" y="20" width="120" height="32" rx="3" fill="#111827" stroke="#00d4ff" stroke-width="1"/>
  <text x="700" y="41" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Resource Server</text>

  <!-- Vertical dashed lines -->
  <line x1="110" y1="56" x2="110" y2="400" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="290" y1="56" x2="290" y2="400" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="500" y1="56" x2="500" y2="400" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="700" y1="56" x2="700" y2="400" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: User clicks Login -> Client redirects to Auth Server -->
  <line x1="114" y1="85" x2="286" y2="85" stroke="#00ff41" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="200" y="80" text-anchor="middle" fill="#e2e8f0" font-size="9">1. Clicks "Login"</text>

  <line x1="294" y1="105" x2="496" y2="105" stroke="#00ff41" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="395" y="100" text-anchor="middle" fill="#e2e8f0" font-size="9">Redirect to /authorize</text>

  <!-- Step 2: Auth Server shows login -> User authenticates -->
  <line x1="496" y1="140" x2="114" y2="140" stroke="#00d4ff" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <text x="305" y="135" text-anchor="middle" fill="#e2e8f0" font-size="9">2. Login page (consent screen)</text>

  <line x1="114" y1="165" x2="496" y2="165" stroke="#00ff41" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="305" y="160" text-anchor="middle" fill="#e2e8f0" font-size="9">User authenticates + grants consent</text>

  <!-- Step 3: Auth Server redirects back with code -->
  <line x1="496" y1="200" x2="294" y2="200" stroke="#ffb000" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <text x="395" y="193" text-anchor="middle" fill="#ffb000" font-size="9" class="mono">3. ?code=abc123</text>

  <!-- Step 4: Client sends code + client_secret to Auth Server -->
  <line x1="294" y1="235" x2="496" y2="235" stroke="#00ff41" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="395" y="228" text-anchor="middle" fill="#e2e8f0" font-size="9" class="mono">4. POST /token</text>
  <text x="395" y="250" text-anchor="middle" fill="#4a5568" font-size="8" class="mono">code + client_secret</text>

  <!-- Step 5: Auth Server returns access_token -->
  <line x1="496" y1="270" x2="294" y2="270" stroke="#00d4ff" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <text x="395" y="265" text-anchor="middle" fill="#00d4ff" font-size="9" class="mono">5. access_token</text>

  <!-- Step 6: Client calls API with token -->
  <line x1="294" y1="305" x2="696" y2="305" stroke="#00ff41" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="495" y="298" text-anchor="middle" fill="#e2e8f0" font-size="9" class="mono">6. Authorization: Bearer ...</text>

  <!-- Step 7: Resource Server returns data -->
  <line x1="696" y1="335" x2="294" y2="335" stroke="#00d4ff" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <text x="495" y="330" text-anchor="middle" fill="#e2e8f0" font-size="9">7. Protected resource (JSON)</text>

  <!-- Step 7 forwarded to User -->
  <line x1="286" y1="355" x2="114" y2="355" stroke="#00d4ff" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <text x="200" y="350" text-anchor="middle" fill="#e2e8f0" font-size="9">Display data</text>

  <!-- PKCE note box -->
  <rect x="40" y="385" width="380" height="38" rx="3" fill="#111827" stroke="#ffb000" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="52" y="401" fill="#ffb000" font-size="9" font-weight="600">PKCE Extension</text>
  <text x="52" y="414" fill="#e2e8f0" font-size="8" class="mono">code_verifier + code_challenge prevents interception</text>

  <!-- Copyright -->
  <text x="788" y="452" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>