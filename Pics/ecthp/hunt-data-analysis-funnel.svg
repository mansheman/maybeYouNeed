<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 15px; font-weight: 700; fill: #f8fafc; }
      .small { font-size: 11px; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1040" height="560" fill="#0a0e17"/>
  <text x="520" y="34" text-anchor="middle" class="title">Data Analysis Funnel for Threat Hunting</text>
  <text x="520" y="54" text-anchor="middle" class="small">Start wide, then progressively reduce the data until it answers the hypothesis.</text>

  <polygon points="180,96 860,96 760,196 280,196" fill="#2563eb"/>
  <text x="520" y="146" text-anchor="middle" class="label">1. Review Data and Baselines</text>
  <text x="520" y="166" text-anchor="middle" class="small">sources, timeframe, normal processes, logins, connections, tasks, approved software</text>

  <polygon points="280,220 760,220 690,314 350,314" fill="#22c55e"/>
  <text x="520" y="262" text-anchor="middle" class="label">2. Search</text>
  <text x="520" y="282" text-anchor="middle" class="small">query, tune, filter, adjust time, hosts, users, exclusions</text>

  <polygon points="350,338 690,338 640,416 400,416" fill="#d97706"/>
  <text x="520" y="374" text-anchor="middle" class="label">3. Aggregate and Compare</text>
  <text x="520" y="394" text-anchor="middle" class="small">most common, least common, outliers, grouping by field</text>

  <polygon points="420,440 620,440 590,504 450,504" fill="#ef4444"/>
  <text x="520" y="472" text-anchor="middle" class="label">4. Refine into Evidence</text>
  <text x="520" y="490" text-anchor="middle" class="small">full command, host, user, execution count, and decision context</text>

  <text x="1032" y="552" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>
