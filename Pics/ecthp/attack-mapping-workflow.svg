<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 15px; font-weight: 700; fill: #f8fafc; }
      .small { font-size: 11px; fill: #cbd5e1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#0a0e17"/>
  <text x="600" y="34" text-anchor="middle" class="title">Adversary Analysis with ATT&amp;CK</text>
  <text x="600" y="54" text-anchor="middle" fill="#64748b" font-size="10">Map behavior to tactics and techniques, then turn it into hunts, detections, and response context.</text>

  <rect x="70" y="188" width="220" height="132" rx="24" fill="#1d4ed8"/>
  <text x="180" y="225" text-anchor="middle" class="label">Observed Behavior</text>
  <text x="180" y="250" text-anchor="middle" class="small">PowerShell</text>
  <text x="180" y="270" text-anchor="middle" class="small">Web protocols</text>
  <text x="180" y="290" text-anchor="middle" class="small">Unusual process tree</text>

  <rect x="370" y="126" width="460" height="256" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="600" y="162" text-anchor="middle" fill="#38bdf8" font-size="22" font-weight="700">ATT&amp;CK Mapping</text>

  <rect x="410" y="196" width="170" height="66" rx="18" fill="#2563eb"/>
  <text x="495" y="224" text-anchor="middle" class="label">Tactics</text>
  <text x="495" y="244" text-anchor="middle" class="small">Adversary goals</text>

  <rect x="620" y="196" width="170" height="66" rx="18" fill="#22c55e"/>
  <text x="705" y="224" text-anchor="middle" class="label">Techniques</text>
  <text x="705" y="244" text-anchor="middle" class="small">How the goal is achieved</text>

  <rect x="410" y="286" width="170" height="66" rx="18" fill="#d97706"/>
  <text x="495" y="314" text-anchor="middle" class="label">Data Sources</text>
  <text x="495" y="334" text-anchor="middle" class="small">Which logs and signals help</text>

  <rect x="620" y="286" width="170" height="66" rx="18" fill="#a855f7"/>
  <text x="705" y="314" text-anchor="middle" class="label">Mitigations</text>
  <text x="705" y="334" text-anchor="middle" class="small">Defensive response options</text>

  <rect x="930" y="100" width="200" height="84" rx="20" fill="#0f766e"/>
  <text x="1030" y="136" text-anchor="middle" class="label">Hunt Hypotheses</text>
  <text x="1030" y="158" text-anchor="middle" class="small">Search for likely follow-on activity</text>

  <rect x="930" y="210" width="200" height="84" rx="20" fill="#ef4444"/>
  <text x="1030" y="246" text-anchor="middle" class="label">Detection Rules</text>
  <text x="1030" y="268" text-anchor="middle" class="small">Prioritize engineering work</text>

  <rect x="930" y="320" width="200" height="84" rx="20" fill="#f59e0b"/>
  <text x="1030" y="356" text-anchor="middle" class="label">IR Context</text>
  <text x="1030" y="378" text-anchor="middle" class="small">Objectives, scope, actor fit</text>

  <line x1="290" y1="254" x2="370" y2="254" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="830" y1="162" x2="930" y2="142" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="830" y1="254" x2="930" y2="252" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="830" y1="348" x2="930" y2="362" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="600" y="510" text-anchor="middle" fill="#94a3b8" font-size="10">ATT&amp;CK supports attribution and analysis, but it is strongest as a behavior-mapping framework.</text>
  <text x="1190" y="552" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
