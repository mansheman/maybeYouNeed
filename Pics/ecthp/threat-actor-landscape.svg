<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 620">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 16px; font-weight: 700; fill: #f8fafc; }
      .small { font-size: 11px; fill: #cbd5e1; }
      .axis { font-size: 11px; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1240" height="620" fill="#0a0e17"/>
  <text x="620" y="36" text-anchor="middle" class="title">Threat Actor Landscape</text>
  <text x="620" y="58" text-anchor="middle" class="small">A simple study lens: think in terms of access, resources, and motivation.</text>

  <line x1="120" y1="520" x2="1120" y2="520" stroke="#334155" stroke-width="3"/>
  <line x1="120" y1="520" x2="120" y2="120" stroke="#334155" stroke-width="3"/>
  <text x="1120" y="546" text-anchor="end" class="axis">More resources and sophistication</text>
  <g transform="translate(48 320) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" class="axis">More strategic or high-impact motivation</text>
  </g>

  <circle cx="290" cy="420" r="72" fill="#ef4444"/>
  <text x="290" y="414" text-anchor="middle" class="label">Others</text>
  <text x="290" y="438" text-anchor="middle" class="small">script kiddies,</text>
  <text x="290" y="454" text-anchor="middle" class="small">low-skill, insider error</text>

  <circle cx="520" cy="310" r="78" fill="#f59e0b"/>
  <text x="520" y="304" text-anchor="middle" class="label">Hacktivists</text>
  <text x="520" y="328" text-anchor="middle" class="small">social or political goals</text>

  <circle cx="720" cy="384" r="86" fill="#22c55e"/>
  <text x="720" y="378" text-anchor="middle" class="label">Organized Crime</text>
  <text x="720" y="402" text-anchor="middle" class="small">profit, extortion, fraud, theft</text>

  <circle cx="930" cy="210" r="90" fill="#2563eb"/>
  <text x="930" y="202" text-anchor="middle" class="label">Nation-State</text>
  <text x="930" y="226" text-anchor="middle" class="small">espionage, warfare, influence</text>

  <circle cx="1080" cy="150" r="82" fill="#a855f7"/>
  <text x="1080" y="144" text-anchor="middle" class="label">APT</text>
  <text x="1080" y="168" text-anchor="middle" class="small">persistent, stealthy, long-term</text>

  <rect x="170" y="86" width="300" height="68" rx="18" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="320" y="116" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">First split</text>
  <text x="320" y="138" text-anchor="middle" class="small">External attackers start without access; internal attackers already have some.</text>

  <text x="1232" y="612" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>
