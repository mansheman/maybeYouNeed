<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 420">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 16px; font-weight: 700; fill: #f8fafc; }
      .small { font-size: 11px; fill: #cbd5e1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1240" height="420" fill="#0a0e17"/>
  <text x="620" y="34" text-anchor="middle" class="title">Enrichment and Contextualization Workflow</text>
  <text x="620" y="54" text-anchor="middle" fill="#64748b" font-size="10">Data about an IoC becomes useful only after it is tied to meaning, relevance, and action.</text>

  <rect x="70" y="146" width="170" height="120" rx="24" fill="#2563eb"/>
  <text x="155" y="190" text-anchor="middle" class="label">Raw IoC</text>
  <text x="155" y="214" text-anchor="middle" class="small">IP, domain, hash,</text>
  <text x="155" y="230" text-anchor="middle" class="small">process clue</text>

  <rect x="330" y="90" width="270" height="232" rx="26" fill="#111827" stroke="#22c55e" stroke-width="2.5"/>
  <text x="465" y="126" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="700">Enrichment Layer</text>
  <text x="465" y="162" text-anchor="middle" class="small">WHOIS</text>
  <text x="465" y="182" text-anchor="middle" class="small">Passive DNS</text>
  <text x="465" y="202" text-anchor="middle" class="small">Reputation and sandboxing</text>
  <text x="465" y="222" text-anchor="middle" class="small">GeoIP and ASN</text>
  <text x="465" y="242" text-anchor="middle" class="small">Related hashes and malware family</text>

  <rect x="660" y="90" width="270" height="232" rx="26" fill="#111827" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="795" y="126" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="700">Context Layer</text>
  <text x="795" y="162" text-anchor="middle" class="small">Is it part of a known campaign?</text>
  <text x="795" y="182" text-anchor="middle" class="small">Which attack stage fits?</text>
  <text x="795" y="202" text-anchor="middle" class="small">Does it affect our sector or stack?</text>
  <text x="795" y="222" text-anchor="middle" class="small">Is it fresh, relevant, and actionable?</text>

  <rect x="990" y="104" width="190" height="204" rx="24" fill="#7c3aed"/>
  <text x="1085" y="140" text-anchor="middle" class="label">Outputs</text>
  <text x="1085" y="170" text-anchor="middle" class="small">Detection engineering</text>
  <text x="1085" y="192" text-anchor="middle" class="small">Threat hunting</text>
  <text x="1085" y="214" text-anchor="middle" class="small">Incident response</text>
  <text x="1085" y="236" text-anchor="middle" class="small">Reporting and intel feeds</text>
  <text x="1085" y="272" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="700">Actionable intelligence</text>

  <line x1="240" y1="206" x2="330" y2="206" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="206" x2="660" y2="206" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="930" y1="206" x2="990" y2="206" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="620" y="394" text-anchor="middle" fill="#94a3b8" font-size="10">Remember: enrichment is data about the IoC; contextualization is the meaning around it.</text>
  <text x="1232" y="412" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>
