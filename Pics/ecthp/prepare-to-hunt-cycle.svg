<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 15px; font-weight: 700; fill: #f8fafc; }
      .small { font-size: 11px; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1080" height="560" fill="#0a0e17"/>
  <text x="540" y="34" text-anchor="middle" class="title">Prepare to Hunt</text>
  <text x="540" y="54" text-anchor="middle" class="small">Preparation is not a single step. It is a loop that improves each future hunt.</text>

  <circle cx="540" cy="280" r="182" fill="none" stroke="#334155" stroke-width="3"/>

  <rect x="444" y="86" width="192" height="70" rx="20" fill="#2563eb"/>
  <text x="540" y="116" text-anchor="middle" class="label">Trigger</text>
  <text x="540" y="136" text-anchor="middle" class="small">intel, risk, anomaly, or finding</text>

  <rect x="760" y="194" width="220" height="74" rx="20" fill="#22c55e"/>
  <text x="870" y="224" text-anchor="middle" class="label">Investigate and Analyze</text>
  <text x="870" y="244" text-anchor="middle" class="small">search, pivot, validate</text>

  <rect x="720" y="374" width="208" height="72" rx="20" fill="#a855f7"/>
  <text x="824" y="404" text-anchor="middle" class="label">Outcome</text>
  <text x="824" y="424" text-anchor="middle" class="small">confirm, refute, escalate</text>

  <rect x="152" y="374" width="208" height="72" rx="20" fill="#ef4444"/>
  <text x="256" y="404" text-anchor="middle" class="label">Refine Tactics</text>
  <text x="256" y="424" text-anchor="middle" class="small">tune rules, data, and scope</text>

  <rect x="100" y="194" width="236" height="74" rx="20" fill="#f59e0b"/>
  <text x="218" y="224" text-anchor="middle" class="label">Reveal New Information</text>
  <text x="218" y="244" text-anchor="middle" class="small">feeds the next trigger</text>

  <rect x="386" y="468" width="308" height="58" rx="18" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="540" y="502" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Hunting capability depends on intelligence, logging, access, and centralized data.</text>

  <text x="1072" y="552" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>
