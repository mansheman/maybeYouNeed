<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 14px; font-weight: 700; fill: #0a0e17; }
      .detail { font-size: 11px; fill: #cbd5e1; }
      .mini { font-size: 10px; fill: #94a3b8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ffb000"/>
    </marker>
  </defs>

  <rect width="1200" height="420" fill="#0a0e17"/>
  <text x="600" y="34" text-anchor="middle" class="title">Threat Intelligence Across the Cyber Defense Lifecycle</text>
  <text x="600" y="56" text-anchor="middle" class="mini">CTI adds context to prevention, detection, response, recovery, and planning.</text>

  <circle cx="600" cy="210" r="88" fill="#111827" stroke="#f97316" stroke-width="3"/>
  <text x="600" y="200" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Threat</text>
  <text x="600" y="226" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Intelligence</text>
  <text x="600" y="250" text-anchor="middle" class="mini">IOCs, TTPs, attribution, context</text>

  <line x1="600" y1="122" x2="600" y2="94" stroke="#ffb000" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="676" y1="161" x2="835" y2="96" stroke="#ffb000" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="250" x2="858" y2="308" stroke="#ffb000" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="250" x2="342" y2="308" stroke="#ffb000" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="524" y1="161" x2="365" y2="96" stroke="#ffb000" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="495" y="24" width="210" height="56" rx="18" fill="#38bdf8"/>
  <text x="600" y="48" text-anchor="middle" class="label">Planning</text>
  <text x="600" y="64" text-anchor="middle" fill="#0a0e17" font-size="10">Risk, roadmaps, exercises</text>

  <rect x="850" y="58" width="228" height="68" rx="18" fill="#4ade80"/>
  <text x="964" y="86" text-anchor="middle" class="label">Detection</text>
  <text x="964" y="104" text-anchor="middle" fill="#0a0e17" font-size="10">IOC matching, TTP detections, alert enrichment</text>

  <rect x="862" y="294" width="220" height="68" rx="18" fill="#a78bfa"/>
  <text x="972" y="322" text-anchor="middle" class="label">Response</text>
  <text x="972" y="340" text-anchor="middle" fill="#0a0e17" font-size="10">Playbooks, triage context, attribution support</text>

  <rect x="120" y="294" width="238" height="68" rx="18" fill="#f59e0b"/>
  <text x="239" y="322" text-anchor="middle" class="label">Recovery</text>
  <text x="239" y="340" text-anchor="middle" fill="#0a0e17" font-size="10">Lessons learned, improvement planning</text>

  <rect x="120" y="58" width="238" height="68" rx="18" fill="#fb7185"/>
  <text x="239" y="86" text-anchor="middle" class="label">Prevention</text>
  <text x="239" y="104" text-anchor="middle" fill="#0a0e17" font-size="10">Prioritization, hardening, blocklists</text>

  <text x="600" y="396" text-anchor="middle" class="mini">Operationalized CTI works as a force multiplier only when it feeds real controls and decisions.</text>
  <text x="1192" y="412" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>
