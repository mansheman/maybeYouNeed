<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .small { font-size: 10px; }
      .stage { font-size: 11px; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ffb000"/>
    </marker>
  </defs>

  <rect width="1400" height="320" fill="#0a0e17"/>
  <text x="700" y="28" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Cyber Kill Chain</text>

  <text x="70" y="102" fill="#4a5568" font-size="10">Attack progression</text>

  <g transform="translate(40,84) rotate(-35 85 42)">
    <rect x="0" y="0" width="170" height="84" rx="28" fill="none" stroke="#ff0040" stroke-width="10"/>
  </g>
  <g transform="translate(225,74) rotate(35 85 42)">
    <rect x="0" y="0" width="170" height="84" rx="28" fill="none" stroke="#ff8a00" stroke-width="10"/>
  </g>
  <g transform="translate(410,84) rotate(-35 85 42)">
    <rect x="0" y="0" width="170" height="84" rx="28" fill="none" stroke="#ffb000" stroke-width="10"/>
  </g>
  <g transform="translate(595,74) rotate(35 85 42)">
    <rect x="0" y="0" width="170" height="84" rx="28" fill="none" stroke="#00d4ff" stroke-width="10"/>
  </g>
  <g transform="translate(780,84) rotate(-35 85 42)">
    <rect x="0" y="0" width="170" height="84" rx="28" fill="none" stroke="#00ff41" stroke-width="10"/>
  </g>
  <g transform="translate(965,74) rotate(35 85 42)">
    <rect x="0" y="0" width="170" height="84" rx="28" fill="none" stroke="#bf00ff" stroke-width="10"/>
  </g>
  <g transform="translate(1150,84) rotate(-35 85 42)">
    <rect x="0" y="0" width="170" height="84" rx="28" fill="none" stroke="#ff0040" stroke-width="10"/>
  </g>

  <g>
    <text x="125" y="212" text-anchor="middle" fill="#ff0040" class="stage">Reconnaissance</text>
    <text x="125" y="230" text-anchor="middle" fill="#e2e8f0" class="small">Gather target information</text>
    <text x="125" y="244" text-anchor="middle" fill="#4a5568" class="small">Passive and active collection</text>
  </g>
  <g>
    <text x="310" y="212" text-anchor="middle" fill="#ff8a00" class="stage">Weaponization</text>
    <text x="310" y="230" text-anchor="middle" fill="#e2e8f0" class="small">Build deliverable payload</text>
    <text x="310" y="244" text-anchor="middle" fill="#4a5568" class="small">RATs, backdoors, downloaders</text>
  </g>
  <g>
    <text x="495" y="212" text-anchor="middle" fill="#ffb000" class="stage">Delivery</text>
    <text x="495" y="230" text-anchor="middle" fill="#e2e8f0" class="small">Send payload to victim</text>
    <text x="495" y="244" text-anchor="middle" fill="#4a5568" class="small">Email, web, USB, watering hole</text>
  </g>
  <g>
    <text x="680" y="212" text-anchor="middle" fill="#00d4ff" class="stage">Exploitation</text>
    <text x="680" y="230" text-anchor="middle" fill="#e2e8f0" class="small">Run payload on target</text>
    <text x="680" y="244" text-anchor="middle" fill="#4a5568" class="small">May chain into additional payloads</text>
  </g>
  <g>
    <text x="865" y="212" text-anchor="middle" fill="#00ff41" class="stage">Installation</text>
    <text x="865" y="230" text-anchor="middle" fill="#e2e8f0" class="small">Install tools or malware</text>
    <text x="865" y="244" text-anchor="middle" fill="#4a5568" class="small">Persistence and secondary tooling</text>
  </g>
  <g>
    <text x="1050" y="212" text-anchor="middle" fill="#bf00ff" class="stage">Command &amp; Control</text>
    <text x="1050" y="230" text-anchor="middle" fill="#e2e8f0" class="small">Connect to attacker infra</text>
    <text x="1050" y="244" text-anchor="middle" fill="#4a5568" class="small">Encrypted or disguised traffic</text>
  </g>
  <g>
    <text x="1235" y="212" text-anchor="middle" fill="#ff0040" class="stage">Actions on Objectives</text>
    <text x="1235" y="230" text-anchor="middle" fill="#e2e8f0" class="small">Complete attacker goals</text>
    <text x="1235" y="244" text-anchor="middle" fill="#4a5568" class="small">Theft, ransom, disruption, persistence</text>
  </g>

  <text x="700" y="292" text-anchor="middle" fill="#4a5568" font-size="10">Each stage is represented as an interlocked link, showing the intrusion path from start to finish.</text>
  <text x="1388" y="312" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>
