<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 14px; font-weight: 700; fill: #f8fafc; }
      .small { font-size: 11px; fill: #cbd5e1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1280" height="420" fill="#0a0e17"/>
  <text x="640" y="34" text-anchor="middle" class="title">Wireshark Analysis Workflow</text>
  <text x="640" y="54" text-anchor="middle" class="small">Start broad, summarize the capture, then narrow into specific conversations and protocol behavior.</text>

  <rect x="30" y="152" width="180" height="90" rx="22" fill="#2563eb"/>
  <text x="120" y="186" text-anchor="middle" class="label">Open Capture</text>
  <text x="120" y="208" text-anchor="middle" class="small">pcap or live traffic</text>

  <rect x="240" y="152" width="180" height="90" rx="22" fill="#22c55e"/>
  <text x="330" y="186" text-anchor="middle" class="label">Summarize</text>
  <text x="330" y="208" text-anchor="middle" class="small">protocol hierarchy, expert info</text>

  <rect x="450" y="152" width="180" height="90" rx="22" fill="#d97706"/>
  <text x="540" y="186" text-anchor="middle" class="label">Filter</text>
  <text x="540" y="208" text-anchor="middle" class="small">display filters by host or protocol</text>

  <rect x="660" y="152" width="180" height="90" rx="22" fill="#a855f7"/>
  <text x="750" y="186" text-anchor="middle" class="label">Conversations</text>
  <text x="750" y="208" text-anchor="middle" class="small">resolved addresses, stream counts</text>

  <rect x="870" y="152" width="180" height="90" rx="22" fill="#ef4444"/>
  <text x="960" y="186" text-anchor="middle" class="label">Follow Stream</text>
  <text x="960" y="208" text-anchor="middle" class="small">reconstruct application exchanges</text>

  <rect x="1080" y="152" width="170" height="90" rx="22" fill="#0f766e"/>
  <text x="1165" y="186" text-anchor="middle" class="label">Decide</text>
  <text x="1165" y="208" text-anchor="middle" class="small">normal, abnormal, or malicious</text>

  <line x1="210" y1="197" x2="240" y2="197" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="420" y1="197" x2="450" y2="197" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="630" y1="197" x2="660" y2="197" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="840" y1="197" x2="870" y2="197" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1050" y1="197" x2="1080" y2="197" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="640" y="334" text-anchor="middle" fill="#94a3b8" font-size="11">Use capture filters for collection control. Use display filters to investigate without losing evidence.</text>
  <text x="1272" y="412" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>
